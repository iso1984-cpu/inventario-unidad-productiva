<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP v15 - Engineering Edition</title>

    <!-- 1. CARGA ASÍNCRONA PERO CONTROLADA -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">

    <style>
        :root { --g-red: #e31e24; --g-dark: #2c3e50; }
        body { background-color: #f1f3f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-screen { position: fixed; inset: 0; background: #f1f3f5; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .is-loading { pointer-events: none; opacity: 0.6; filter: grayscale(1); }
        #app { display: none; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen is-loading">
    <div class="card shadow-lg p-5 text-center" style="width: 450px; border-radius: 20px;">
        <h3 class="fw-bold text-danger mb-4">GUERRERO ERP</h3>
        
        <!-- Indicador de estado de ingeniería -->
        <div id="status-bar" class="alert alert-info py-2 small">⚙️ Inicializando núcleo del sistema...</div>

        <select id="select_caja" class="form-select mb-3">
            <optgroup label="Caja 1"><option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option><option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option></optgroup>
            <optgroup label="Caja 2"><option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option><option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option></optgroup>
            <optgroup label="Caja 3"><option value="Caja 3 Mañana">☀️ Caja 3 - Mañana</option><option value="Caja 3 Tarde">🌙 Caja 3 - Tarde</option></optgroup>
            <optgroup label="Caja 4"><option value="Caja 4 Mañana">☀️ Caja 4 - Mañana</option><option value="Caja 4 Tarde">🌙 Caja 4 - Tarde</option></optgroup>
        </select>

        <input type="email" id="log_user" class="form-control mb-2" placeholder="sarita.6421@gmail.com">
        <input type="password" id="log_pass" class="form-control mb-4" placeholder="••••••••">
        <button id="btn-login" class="btn btn-danger w-100 py-3 fw-bold shadow" onclick="GuerreroApp.login()" disabled>CONECTANDO...</button>
    </div>
</div>

<div id="app">
    <!-- Resto de tu interfaz de ventas/inventario aquí -->
</div>

<script>
/**
 * ARQUITECTURA DE MÓDULO SEGURO (ENCAPSULAMIENTO)
 * Previene colisiones de variables y errores de inicialización.
 */
const GuerreroApp = (() => {
    // Configuración privada
    const CONFIG = {
        SURL: "https://tzseklsayxaldtqatwuq.supabase.co",
        SKEY: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    let client = null;
    let session = { user: null, caja: null, timer: 18000 };

    // Método de arranque profesional
    const init = async () => {
        const status = document.getElementById('status-bar');
        const btn = document.getElementById('btn-login');
        const screen = document.getElementById('login-screen');

        try {
            // Espera activa a la librería (Retry Pattern)
            let attempts = 0;
            while (!window.supabase && attempts < 10) {
                await new Promise(r => setTimeout(r, 500));
                attempts++;
            }

            if (!window.supabase) throw new Error("SDK no disponible");

            // Instanciación
            client = window.supabase.createClient(CONFIG.SURL, CONFIG.SKEY);
            
            // Éxito: Desbloqueo de UI
            status.className = "alert alert-success py-2 small";
            status.innerText = "✅ Conexión establecida";
            btn.disabled = false;
            btn.innerText = "INICIAR TURNO 5H";
            screen.classList.remove('is-loading');

        } catch (e) {
            status.className = "alert alert-danger py-2 small";
            status.innerText = "❌ Error crítico: Revise su conexión";
            console.error("[Kernel] Error:", e);
        }
    };

    const login = async () => {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;
        const btn = document.getElementById('btn-login');

        btn.disabled = true;
        btn.innerText = "AUTENTICANDO...";

        const { data, error } = await client.auth.signInWithPassword({ email, password: pass });

        if (error) {
            alert("Error: " + error.message);
            btn.disabled = false;
            btn.innerText = "INICIAR TURNO 5H";
            return;
        }

        // Transición a la App
        session.user = data.user;
        session.caja = document.getElementById('select_caja').value;
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        console.log(`🚀 Sesión iniciada: ${session.caja}`);
    };

    // Ejecutar inicialización al cargar
    window.addEventListener('DOMContentLoaded', init);

    // API Pública del módulo
    return { login };
})();
</script>
</body>
</html>
