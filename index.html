<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GUERRERO ERP v2.8.0 - Master Edition</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #1a1a1a; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; }
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--g-dark); }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        #main-app { display: none; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--g-dark); color: white; position: fixed; height: 100vh; z-index: 1000; }
        .nav-link { color: #adb5bd; padding: 12px 25px; cursor: pointer; text-decoration: none; display: block; border-left: 4px solid transparent; }
        .nav-link.active { background: #2a2a2a; color: white !important; border-left-color: var(--g-red); }
        main { margin-left: 260px; flex-grow: 1; padding: 25px; width: calc(100% - 260px); }
        .workspace { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); min-height: 75vh; }
        .item-row { display: grid; grid-template-columns: 1fr 3fr 1.2fr 1fr 1.2fr 40px; gap: 10px; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        #results { position: absolute; width: 100%; z-index: 2000; background: white; border: 1px solid #ddd; max-height: 250px; overflow-y: auto; border-radius: 0 0 10px 10px; }
        .res-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .total-box { border-left: 5px solid var(--g-red); background: #fff; padding: 20px; border-radius: 10px; position: sticky; top: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card shadow-lg text-center">
        <h3 class="fw-bold mb-1">GUERRERO <span class="text-danger">ERP</span></h3>
        <p class="text-muted small mb-4">v2.8.0 | SEGURO</p>
        <select id="select-caja" class="form-select mb-3 fw-bold"><option>Caja 1 - Mañana</option><option>Caja 1 - Tarde</option></select>
        <input type="text" id="u" class="form-control mb-2" placeholder="Usuario">
        <input type="password" id="p" class="form-control mb-4" placeholder="Contraseña">
        <button class="btn btn-danger w-100 fw-bold py-3" onclick="login()">INGRESAR</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <div class="p-4 border-bottom border-secondary mb-3">
            <h5 class="fw-bold text-white mb-0">GUERRERO ERP</h5>
            <small id="info-u" class="text-secondary small">Cajero: ---</small>
        </div>
        <div class="nav flex-column">
            <div class="nav-link active" id="btn-S" onclick="setModulo('SALIDA')">📦 Remisión de Venta</div>
            <div class="nav-link" id="btn-E" onclick="setModulo('ENTRADA')">📥 Remisión de Compra</div>
            <div class="nav-link text-info mt-4" onclick="enviarCierreGmail()">📧 Cierre y Alertas (Gmail)</div>
            <div class="nav-link text-warning mt-2" onclick="location.reload()">🔒 Salir</div>
        </div>
    </div>

    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="m-title" class="fw-bold mb-0">Remisión de Venta</h2>
            <div id="reloj" class="h4 font-monospace text-danger bg-white px-3 py-2 rounded shadow-sm border">00:00:00</div>
        </div>

        <div class="row">
            <div class="col-md-9">
                <div class="workspace">
                    <div class="position-relative mb-3">
                        <input type="text" id="buscador" class="form-control form-control-lg border-danger" 
                               placeholder="🔍 Código (2+ dig) o Producto..." oninput="buscar(this.value)"
                               onkeypress="if(event.key==='Enter'){event.preventDefault();buscar(this.value,true)}">
                        <div id="results" style="display:none;"></div>
                    </div>
                    <div class="item-row bg-light fw-bold small rounded">
                        <span>CÓDIGO</span><span>PRODUCTO</span><span>PRECIO</span><span>CANT</span><span class="text-end">TOTAL</span><span></span>
                    </div>
                    <div id="lista-items" class="mt-2"></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="total-box shadow-sm border text-center">
                    <label class="small fw-bold text-secondary">TOTAL DOCUMENTO</label>
                    <h1 class="fw-bold text-danger my-2">$<span id="total-val">0</span></h1>
                    <button class="btn btn-danger btn-lg w-100 py-3 fw-bold mb-2 shadow" onclick="finalizar()">COBRAR / GUARDAR</button>
                    <button class="btn btn-outline-dark w-100 mb-2" onclick="reimprimir()">🔄 RE-IMPRIMIR</button>
                    <button class="btn btn-outline-secondary w-100" onclick="if(confirm('¿Limpiar?')){cart=[];render();}">CANCELAR</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const VAULT = { U: "https://tzseklsayxaldtqatwuq.supabase.co", K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5" };
    const headers = { 'apikey': VAULT.K, 'Authorization': `Bearer ${VAULT.K}`, 'Content-Type': 'application/json' };
    
    let cart = [], modulo = 'SALIDA', uActivo = '', caja = '', searchTimeout = null;
    const beep = new Audio('https://www.soundjay.com');

    async function login() {
        const user = document.getElementById('u').value.trim();
        const pass = document.getElementById('p').value.trim();
        const res = await fetch(`${VAULT.U}/rest/v1/usuarios?usuario=eq.${user}&password=eq.${pass}&select=*`, { headers });
        const d = await res.json();
        if (d.length > 0) {
            uActivo = d[0].usuario; caja = document.getElementById('select-caja').value;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('info-u').innerText = "Cajero: " + uActivo;
        } else alert("Acceso Incorrecto");
    }

    async function buscar(v, exact = false) {
        if(v.length < 2) { document.getElementById('results').style.display='none'; return; }
        const r = await fetch(`${VAULT.U}/rest/v1/productos?or=(descripcion.ilike.*${v}*,codigo.eq.${v})&limit=10`, { headers });
        const d = await r.json();
        if ((exact || (v.length <= 4 && d.length === 1)) && d.length > 0) {
            add(d[0] || d); document.getElementById('buscador').value = '';
            document.getElementById('results').style.display = 'none';
        } else mostrarRes(d);
    }

    function mostrarRes(d) {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = d.map(x => `<div class="res-item" onclick='add(${JSON.stringify(x)})'>
            <span><b>${x.descripcion}</b> (${x.codigo})</span>
            <span class="text-danger fw-bold">$${parseInt(x.precio_1 || 0).toLocaleString()}</span>
        </div>`).join('');
        resDiv.style.display = d.length > 0 ? 'block' : 'none';
    }

    function add(x) {
        beep.play();
        const ex = cart.find(i => i.codigo === x.codigo);
        ex ? ex.qty++ : cart.push({...x, qty: 1});
        document.getElementById('results').style.display='none';
        document.getElementById('buscador').value = '';
        document.getElementById('buscador').focus();
        render();
    }

    function render() {
        let t = 0;
        document.getElementById('lista-items').innerHTML = cart.map((x, i) => {
            const p = parseFloat(x.precio_1) || 0; const s = p * x.qty; t += s;
            return `<div class="item-row">
                <span class="text-muted">${x.codigo}</span><span class="fw-bold">${x.descripcion}</span>
                <input type="number" class="form-control form-control-sm" value="${p}" onchange="cart[${i}].precio_1=this.value;render()">
                <input type="number" class="form-control form-control-sm" value="${x.qty}" onchange="cart[${i}].qty=this.value;render()">
                <span class="text-end text-danger fw-bold">$${s.toLocaleString()}</span>
                <button class="btn btn-sm text-danger" onclick="cart.splice(${i},1);render()">✕</button>
            </div>`;
        }).join('');
        document.getElementById('total-val').innerText = t.toLocaleString();
    }

    async function finalizar() {
        if(!cart.length) return;
        const met = modulo === 'SALIDA' ? (confirm("¿Efectivo? (Aceptar: EFECTIVO / Cancelar: TRANSF)") ? "EFECTIVO" : "TRANSFERENCIA") : "INGRESO COMPRA";
        const rpc = modulo === 'SALIDA' ? 'guardar_remision_venta' : 'guardar_remision_compra';

        try {
            const res = await fetch(`${VAULT.U}/rest/v1/rpc/${rpc}`, {
                method: 'POST', headers,
                body: JSON.stringify({ items: cart, p_caja: caja, p_user: uActivo, p_metodo: met })
            });
            const num = await res.json();
            if(!res.ok) throw new Error("Error en Servidor");

            const ticket = { items: [...cart], num, tipo: modulo, fecha: new Date().toLocaleString(), met, cajero: uActivo };
            localStorage.setItem('ultimo', JSON.stringify(ticket));
            
            alert(`✅ ${modulo} EXITOSA - Nro: ${num}`);
            if(confirm("📄 ¿Imprimir Soporte Detallado?")) imprimir(ticket);

            cart = []; render();
            document.getElementById('buscador').focus();
        } catch (e) { alert("❌ Error: " + e.message); }
    }

    function imprimir(d) {
        const win = window.open('', '', 'width=300,height=600');
        const tit = d.tipo === 'SALIDA' ? 'REMISION DE VENTA' : 'REMISION DE COMPRA';
        win.document.write(`<pre style="font-family:monospace;font-size:11px;">
       GUERRERO ERP v2.8.0
      ${tit} #${d.num}
--------------------------------
Fecha: ${d.fecha} | Cajero: ${d.cajero}
--------------------------------
CANT  COD    DESCRIPCION   TOTAL
${d.items.map(i => `${i.qty.toString().padEnd(4)} ${i.codigo.padEnd(6)} ${i.descripcion.substring(0,10).padEnd(10)} $${(i.precio_1*i.qty).toLocaleString().padStart(7)}`).join('\n')}
--------------------------------
TOTAL: $${d.items.reduce((a,b)=>a+(b.precio_1*b.qty),0).toLocaleString().padStart(12)}
METODO: ${d.met}
--------------------------------
    ¡GRACIAS POR SU COMPRA!
</pre>`);
        win.print(); win.close();
    }

    function reimprimir() { const d = JSON.parse(localStorage.getItem('ultimo')); if(d) imprimir(d); else alert("No hay ticket previo"); }

    async function enviarCierreGmail() {
        const hoy = new Date().toISOString().split('T')[0];
        // 1. Obtener Ventas de hoy
        const resV = await fetch(`${VAULT.U}/rest/v1/remision_de_venta?fecha=gte.${hoy}&select=consecutivo,metodo_pago,fecha`, { headers });
        const ventas = await resV.json();
        
        // 2. Obtener Stock Crítico (Menos de 5 unidades)
        const resS = await fetch(`${VAULT.U}/rest/v1/productos?stock=lt.5&select=descripcion,stock`, { headers });
        const critico = await resS.json();

        let cuerpo = `*REPORTE DE CIERRE - ${hoy}*%0A%0A`;
        cuerpo += `💰 *TOTAL DOCUMENTOS:* ${ventas.length}%0A`;
        cuerpo += `Cajero Responsable: ${uActivo}%0A%0A`;
        cuerpo += `⚠️ *ALERTAS DE STOCK (BAJO):*%0A`;
        cuerpo += critico.map(i => `- ${i.descripcion}: Quedan ${i.stock} un.`).join('%0A') || 'Sin alertas';
        
        window.open(`mailto:sarita.6421@://gmail.com GUERRERO ERP ${hoy}&body=${cuerpo}`);
    }

    function setModulo(m) {
        modulo = m;
        document.getElementById('m-title').innerText = `Remisión de ${m === 'SALIDA' ? 'Venta' : 'Compra'}`;
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(`btn-${m.substring(0,1)}`).classList.add('active');
        cart = []; render();
    }

    setInterval(() => document.getElementById('reloj').innerText = new Date().toLocaleTimeString(), 1000);
</script>
</body>
</html>
