<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUERRERO ERP - Acceso Directo</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #2c3e50; }
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 15px; }
        .login-box { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        #app { display: none; width: 100%; max-width: 600px; text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .timer-display { font-size: 2.5rem; font-weight: bold; font-family: monospace; color: var(--g-dark); background: #eee; padding: 15px; border-radius: 12px; margin: 20px 0; border: 2px solid #ddd; }
        .badge-caja { background: var(--g-red); color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO -->
<div id="login-screen" class="login-box">
    <h3 class="fw-bold text-danger mb-4">GUERRERO ERP</h3>
    
    <select id="caja" class="form-select mb-3 py-2">
        <optgroup label="Caja 1"><option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option><option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option></optgroup>
        <optgroup label="Caja 2"><option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option><option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option></optgroup>
        <optgroup label="Caja 3"><option value="Caja 3 Mañana">☀️ Caja 3 - Mañana</option><option value="Caja 3 Tarde">🌙 Caja 3 - Tarde</option></optgroup>
        <optgroup label="Caja 4"><option value="Caja 4 Mañana">☀️ Caja 4 - Mañana</option><option value="Caja 4 Tarde">🌙 Caja 4 - Tarde</option></optgroup>
    </select>

    <input type="email" id="user" class="form-control mb-2 py-2" placeholder="usuario@correo.com">
    <input type="password" id="pass" class="form-control mb-4 py-2" placeholder="Contraseña">
    
    <button id="btn" class="btn btn-danger w-100 py-3 fw-bold shadow-sm" onclick="entrar()">INICIAR TURNO 5H</button>
</div>

<!-- APLICACIÓN PRINCIPAL TRAS LOGIN -->
<div id="app">
    <div class="mb-4"><span id="caja-info" class="badge-caja">---</span></div>
    <h5 class="text-muted">TIEMPO RESTANTE DE TURNO</h5>
    <div id="reloj" class="timer-display">05:00:00</div>
    <p id="user-info" class="fw-bold text-secondary">Cajero: ---</p>
    <hr>
    <div class="alert alert-success py-2">✅ Conexión establecida con Supabase (Fetch Nativo)</div>
    <button class="btn btn-outline-danger w-100 mt-4 py-2" onclick="location.reload()">FINALIZAR TURNO</button>
</div>

<script>
    const API_URL = "https://tzseklsayxaldtqatwuq.supabase.co";
    const API_KEY = "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5";
    let segundosRestantes = 18000; // 5 horas exactas

    async function entrar() {
        const email = document.getElementById('user').value;
        const password = document.getElementById('pass').value;
        const cajaSel = document.getElementById('caja').value;
        const btn = document.getElementById('btn');

        if(!email || !password) return alert("Por favor complete los datos.");

        btn.disabled = true;
        btn.innerText = "AUTENTICANDO...";

        try {
            // Comunicación Directa (Sin SDK pesado)
            const response = await fetch(`${API_URL}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('caja-info').innerText = cajaSel;
                document.getElementById('user-info').innerText = "Cajero: " + email.split('@')[0].toUpperCase();
                iniciarReloj();
            } else {
                alert("Acceso denegado: Revise sus datos.");
                btn.disabled = false;
                btn.innerText = "INICIAR TURNO 5H";
            }
        } catch (error) {
            alert("Error de red: La conexión fue bloqueada.");
            btn.disabled = false;
            btn.innerText = "INICIAR TURNO 5H";
        }
    }

    function iniciarReloj() {
        const display = document.getElementById('reloj');
        const timer = setInterval(() => {
            segundosRestantes--;
            
            let h = Math.floor(segundosRestantes / 3600);
            let m = Math.floor((segundosRestantes % 3600) / 60);
            let s = segundosRestantes % 60;

            display.innerText = 
                h.toString().padStart(2, '0') + ":" + 
                m.toString().padStart(2, '0') + ":" + 
                s.toString().padStart(2, '0');

            if (segundosRestantes <= 0) {
                clearInterval(timer);
                alert("TURNO FINALIZADO. El sistema se cerrará.");
                location.reload();
            }
        }, 1000);
    }
</script>
</body>
</html>
