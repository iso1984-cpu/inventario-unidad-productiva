<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Guerrero - POS Final</title>

    <!-- 1. LIBRERÍA SUPABASE (VERSIÓN UMD ESTABLE PARA VERCEL) -->
    <script src="https://cdn.jsdelivr.net"></script>

    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --guerrero-red: #e31e24; --guerrero-green: #00a650; }
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .login-screen { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .sidebar { background: white; border-right: 1px solid #ddd; min-height: 100vh; padding: 20px; position: fixed; width: 220px; }
        main { margin-left: 240px; padding: 20px; }
    </style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="login-screen" class="login-screen">
    <div class="card p-4 text-center shadow-lg" style="width: 350px;">
        <h4 class="mb-4 fw-bold text-danger">TIENDA GUERRERO</h4>
        <input type="email" id="log_user" class="form-control mb-2" placeholder="Correo corporativo">
        <input type="password" id="log_pass" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-danger w-100 fw-bold" onclick="login()">INGRESAR AL SISTEMA</button>
    </div>
</div>

<div id="app" style="display:none;">
    <nav class="sidebar shadow-sm">
        <h3 class="fw-bold text-danger mb-4">GUERRERO</h3>
        <p id="cajero-name" class="small text-muted fw-bold">Bienvenido</p>
        <button class="btn btn-outline-danger btn-sm w-100 mt-4" onclick="location.reload()">Cerrar Sesión</button>
    </nav>
    <main>
        <div class="card p-4 text-center">
            <h1 class="text-success fw-bold">SISTEMA CONECTADO ✅</h1>
            <p>Conexión exitosa a tu base de datos <strong>tzseklsay...</strong></p>
            <p>Listo para operar con <strong>Precio 1</strong>.</p>
        </div>
    </main>
</div>

<!-- 2. CONFIGURACIÓN DE SUPABASE ENCABEZANDO EL SCRIPT -->
<script>
    // CREDENCIALES EXTRAÍDAS DE TU PROYECTO (tzseklsayxaldtqatwuq)
    const SURL = "https://tzseklsayxaldtqatwuq.supabase.co"; 
    const SKEY = "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5";

    // INICIALIZACIÓN GLOBAL PRIORITARIA
    let supabase;
    try {
        // En la versión UMD cargada arriba, el objeto está en window.supabase
        supabase = window.supabase.createClient(SURL, SKEY);
        console.log("✅ Supabase inicializado correctamente al inicio.");
    } catch (e) {
        console.error("❌ Error de inicialización:", e.message);
    }

    // FUNCIÓN DE LOGIN
    async function login() {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;

        if (!supabase) {
            alert("Error: No hay conexión con el servidor. Revisa tu internet.");
            return;
        }

        const { data, error } = await supabase.auth.signInWithPassword({ 
            email: email, 
            password: pass 
        });

        if (error) {
            alert("Acceso denegado: " + error.message);
        } else {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('cajero-name').innerText = `Cajero: ${email.split('@')[0].toUpperCase()}`;
        }
    }
</script>
</body>
</html>
