<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GUERRERO ERP v2.5.5</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #1a1a1a; }
        body { background: var(--g-dark); font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* LOGIN - Contenedor Abierto para ver todas las cajas */
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { 
            background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); border-top: 6px solid var(--g-red);
            position: relative; z-index: 1000;
        }
        
        /* Selector de Cajas - Estilo Corregido */
        #select-caja { border: 2px solid var(--g-red); font-weight: bold; height: 50px; cursor: pointer; margin-bottom: 20px; }

        #main-app { display: none; background: #f8fafc; min-height: 100vh; }
        .sidebar { background: var(--g-dark); color: white; width: 260px; height: 100vh; position: fixed; z-index: 1100; }
        main { margin-left: 260px; padding: 30px; }
        
        .item-row { 
            display: grid; grid-template-columns: 2.5fr 1fr 1fr 1.2fr 45px; gap: 15px; 
            align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: white; 
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h3 class="fw-bold text-center mb-1">GUERRERO <span class="text-danger">ERP</span></h3>
        <p class="text-center text-muted small mb-4">v2.5.5 | Conexión Supabase Activa</p>
        
        <label class="small fw-bold text-uppercase text-danger mb-1">Punto de Operación:</label>
        <select id="select-caja" class="form-select">
            <option value="Caja 1 - Mañana">Caja 1 - Mañana</option>
            <option value="Caja 1 - Tarde">Caja 1 - Tarde</option>
            <option value="Caja 2 - Mañana">Caja 2 - Mañana</option>
            <option value="Caja 2 - Tarde">Caja 2 - Tarde</option>
            <option value="Caja 3 - Mañana">Caja 3 - Mañana</option>
            <option value="Caja 3 - Tarde">Caja 3 - Tarde</option>
            <option value="Caja 4 - Mañana">Caja 4 - Mañana</option>
            <option value="Caja 4 - Tarde">Caja 4 - Tarde</option>
        </select>

        <div class="mb-4">
            <input type="text" id="user-email" class="form-control mb-2 py-2" placeholder="Usuario">
            <input type="password" id="user-pass" class="form-control py-2" placeholder="Password">
        </div>
        
        <button id="btn-login" class="btn btn-danger w-100 fw-bold py-3 shadow" onclick="login()">INGRESAR AL TURNO</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar p-4">
        <h4 class="fw-bold text-danger border-bottom pb-3 mb-4">G-ERP</h4>
        <div class="nav flex-column">
            <a class="nav-link text-white py-2" href="#" onclick="cambiarModulo('SALIDA')">📦 Remisión Salida</a>
            <a class="nav-link text-white-50 py-2" href="#" onclick="cambiarModulo('ENTRADA')">📥 Remisión Entrada</a>
            <hr class="text-secondary">
            <div id="info-usuario" class="small text-warning mb-2 font-monospace">Sesión: ---</div>
            <div id="terminal-info" class="badge bg-danger p-2 w-100 text-uppercase">Caja No Asignada</div>
        </div>
    </div>
    
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="modulo-title" class="fw-bold">Remisión de Salida</h2>
            <div id="reloj" class="h4 font-monospace text-danger">00:00:00</div>
        </div>
        
        <div class="row">
            <div class="col-md-9 bg-white rounded-4 shadow-sm p-4">
                <div class="position-relative">
                    <input type="text" id="buscador" class="form-control form-control-lg border-danger" placeholder="Buscar por nombre o EAN..." oninput="buscar(this.value)">
                    <div id="results" class="list-group shadow-lg mt-1" style="display:none; position:absolute; z-index:2000; width:100%;"></div>
                </div>
                <div id="lista" class="mt-4"></div>
            </div>
            <div class="col-md-3 text-center">
                <div class="card border-0 shadow-sm p-4">
                    <span class="text-secondary small fw-bold">TOTAL</span>
                    <h2 class="fw-bold text-danger mt-2">$<span id="total">0</span></h2>
                    <button class="btn btn-danger btn-lg w-100 mt-4 rounded-pill py-3 fw-bold" onclick="finalizar()">FINALIZAR</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const VAULT = { 
        U: "https://tzseklsayxaldtqatwuq.supabase.co", 
        K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5" 
    };
    const headers = { 'apikey': VAULT.K, 'Authorization': `Bearer ${VAULT.K}`, 'Content-Type': 'application/json' };
    
    let cart = [], modulo = 'SALIDA', cajaActual = '', usuarioActivo = '';

    // --- LOGIN CORREGIDO PARA COLUMNAS 'usuario' Y 'password' ---
    async function login() {
        const u = document.getElementById('user-email').value.trim();
        const p = document.getElementById('user-pass').value.trim();
        const btn = document.getElementById('btn-login');

        if(!u || !p) return alert("Complete los datos");
        btn.innerText = "VALIDANDO...";

        try {
            // Se usa 'usuario' y 'password' para coincidir con tu tabla de Supabase
            const url = `${VAULT.U}/rest/v1/usuarios?usuario=eq.${encodeURIComponent(u)}&password=eq.${encodeURIComponent(p)}&select=*`;
            const res = await fetch(url, { headers });
            const data = await res.json();

            if (data && data.length > 0) {
                usuarioActivo = data[0].usuario;
                cajaActual = document.getElementById('select-caja').value;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('terminal-info').innerText = cajaActual;
                document.getElementById('info-usuario').innerText = "Cajero: " + usuarioActivo;
            } else {
                alert("Usuario o Contraseña incorrectos. Verifica en Supabase.");
            }
        } catch (e) {
            alert("Error de conexión con la base de datos.");
        } finally {
            btn.innerText = "INGRESAR AL TURNO";
        }
    }

    async function buscar(v) {
        const resDiv = document.getElementById('results');
        if(v.length < 2) { resDiv.style.display='none'; return; }
        const r = await fetch(`${VAULT.U}/rest/v1/productos?or=(nombre.ilike.*${v}*,ean.eq.${v})&select=*`, { headers });
        const d = await r.json();
        resDiv.innerHTML = d.map(x => `
            <button onclick='add(${JSON.stringify(x)})' class="list-group-item list-group-item-action d-flex justify-content-between">
                <span><b>${x.nombre}</b> <small>(Stock: ${x.stock})</small></span>
                <span class="text-danger fw-bold">$${x.precio1}</span>
            </button>`).join('');
        resDiv.style.display='block';
    }

    function add(x) {
        cart.push({...x, qty: 1});
        document.getElementById('results').style.display='none';
        document.getElementById('buscador').value = '';
        render();
    }

    function render() {
        let t = 0;
        document.getElementById('lista').innerHTML = cart.map((x, i) => {
            const sub = x.precio1 * x.qty;
            t += sub;
            return `<div class="item-row">
                <span class="fw-bold small">${x.nombre}</span>
                <input type="number" class="form-control" value="${x.precio1}" onchange="cart[${i}].precio1=this.value;render()">
                <input type="number" class="form-control" value="${x.qty}" onchange="cart[${i}].qty=this.value;render()">
                <b class="text-end text-danger">$${sub.toLocaleString()}</b>
                <button class="btn btn-sm btn-outline-danger" onclick="cart.splice(${i},1);render()">×</button>
            </div>`;
        }).join('');
        document.getElementById('total').innerText = t.toLocaleString();
    }

    async function finalizar() {
        if(!cart.length) return;
        for(let x of cart) {
            const tabla = modulo === 'SALIDA' ? 'salidas' : 'entradas';
            await fetch(`${VAULT.U}/rest/v1/${tabla}`, { 
                method: 'POST', headers, 
                body: JSON.stringify({ producto: x.nombre, monto: x.precio1 * x.qty, fecha: new Date().toISOString(), terminal: cajaActual, usuario: usuarioActivo }) 
            });
            const st = modulo === 'SALIDA' ? (x.stock - x.qty) : (parseInt(x.stock) + parseInt(x.qty));
            await fetch(`${VAULT.U}/rest/v1/productos?id=eq.${x.id}`, { method: 'PATCH', headers, body: JSON.stringify({ stock: st }) });
        }
        alert("✅ Remisión de " + modulo + " completada");
        location.reload();
    }

    function cambiarModulo(m) { 
        modulo = m; 
        document.getElementById('modulo-title').innerText = `Remisión de ${m}`;
        cart = []; render(); 
    }

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
