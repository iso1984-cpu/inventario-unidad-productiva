<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Guerrero - Sistema Nativo v3</title>
    <!-- Solo Bootstrap para el diseño -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --guerrero-red: #e31e24; --guerrero-green: #00a650; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .login-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .sidebar { background: white; border-right: 1px solid #ddd; min-height: 100vh; padding: 20px; position: fixed; width: 240px; }
        main { margin-left: 260px; padding: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .status-dot { height: 10px; width: 10px; background-color: #ffc107; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO -->
<div id="login-screen" class="login-screen">
    <div class="card p-5 text-center shadow-lg" style="width: 400px;">
        <h3 class="mb-2 fw-bold text-danger">TIENDA GUERRERO</h3>
        <div class="mb-4 small text-muted"><span class="status-dot" id="dot"></span> <span id="status-text">Sistema Nativo Listo</span></div>
        <input type="email" id="log_user" class="form-control mb-2" placeholder="sarita.6421@gmail.com">
        <input type="password" id="log_pass" class="form-control mb-3" placeholder="Contraseña">
        <button id="btn-login" class="btn btn-danger w-100 fw-bold py-2" onclick="loginNativo()">INGRESAR AL ERP</button>
    </div>
</div>

<!-- APLICACIÓN PRINCIPAL -->
<div id="app" style="display:none;">
    <nav class="sidebar shadow-sm">
        <h4 class="fw-bold text-danger mb-4">GUERRERO ERP</h4>
        <div class="nav flex-column nav-pills">
            <button class="nav-link active mb-2">🛒 Ventas (Precio 1)</button>
            <button class="nav-link mb-2" onclick="alert('Funcionalidad de Inventario Activa')">📊 Inventario</button>
        </div>
        <hr>
        <p id="user-display" class="small fw-bold text-muted">Usuario: ---</p>
        <button class="btn btn-sm btn-link text-danger p-0" onclick="location.reload()">Cerrar Sesión</button>
    </nav>

    <main>
        <div class="card p-4">
            <h5 class="fw-bold">Remisión de Salida - Control Total</h5>
            <div class="row g-2 mt-2">
                <div class="col-8">
                    <input type="text" id="scan_input" class="form-control form-control-lg" placeholder="Escanee producto...">
                </div>
                <div class="col-4">
                    <h2 class="text-success text-end fw-bold">TOTAL: $<span id="total_val">0</span></h2>
                </div>
            </div>
            <hr>
            <div class="alert alert-info">Sistema conectado directamente a la API de Supabase (tzseklsay...).</div>
        </div>
    </main>
</div>

<script>
    // CREDENCIALES DIRECTAS
    const SURL = "https://tzseklsayxaldtqatwuq.supabase.co"; 
    const SKEY = "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5";

    async function loginNativo() {
        const email = document.getElementById('log_user').value;
        const password = document.getElementById('log_pass').value;
        const btn = document.getElementById('btn-login');
        const dot = document.getElementById('dot');

        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";

        try {
            // PETICIÓN DIRECTA A LA API DE AUTENTICACIÓN (Sin librerías externas)
            const response = await fetch(`${SURL}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: {
                    'apikey': SKEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // ÉXITO: El usuario existe y la clave es correcta
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('user-display').innerText = "Cajero: " + email.split('@')[0].toUpperCase();
                dot.style.backgroundColor = "#00a650";
            } else {
                // ERROR: Datos incorrectos o usuario no confirmado
                alert("ERROR DE ACCESO: " + (data.error_description || "Verifique sus datos"));
                btn.disabled = false;
                btn.innerText = "INGRESAR AL ERP";
            }
        } catch (error) {
            console.error(error);
            alert("Error de red: No se pudo contactar con Supabase.");
            btn.disabled = false;
            btn.innerText = "INGRESAR AL ERP";
        }
    }
</script>
</body>
</html>
