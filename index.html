<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP v15 - Blindaje Total</title>

    <!-- 1. CARGA DE LIBRERÍAS CON RESPALDO -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">

    <style>
        :root { --g-red: #e31e24; --g-dark: #2c3e50; }
        body { background-color: #f1f3f5; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .status-msg { font-size: 0.85rem; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        #app { display: none; position: fixed; inset: 0; background: white; z-index: 10000; padding: 20px; }
    </style>
</head>
<body>

<div id="login-screen" class="login-card">
    <h3 class="fw-bold text-danger mb-4">GUERRERO ERP</h3>
    
    <!-- Monitor de Sistema -->
    <div id="status-bar" class="status-msg alert-secondary text-muted">
        ⌛ Sincronizando núcleo...
    </div>

    <select id="select_caja" class="form-select mb-3">
        <option value="Caja 1 - Mañana">☀️ Caja 1 - Mañana</option>
        <option value="Caja 1 - Tarde">🌙 Caja 1 - Tarde</option>
        <option value="Caja 2 - Mañana">☀️ Caja 2 - Mañana</option>
        <option value="Caja 2 - Tarde">🌙 Caja 2 - Tarde</option>
        <option value="Caja 3 - Mañana">☀️ Caja 3 - Mañana</option>
        <option value="Caja 3 - Tarde">🌙 Caja 3 - Tarde</option>
        <option value="Caja 4 - Mañana">☀️ Caja 4 - Mañana</option>
        <option value="Caja 4 - Tarde">🌙 Caja 4 - Tarde</option>
    </select>

    <input type="email" id="log_user" class="form-control mb-2" placeholder="sarita.6421@gmail.com">
    <input type="password" id="log_pass" class="form-control mb-4" placeholder="••••••••">
    
    <button id="btn-login" class="btn btn-danger w-100 py-3 fw-bold" onclick="GuerreroEngine.login()" disabled>
        CONECTANDO...
    </button>
</div>

<div id="app">
    <h1>Bienvenido a Guerrero ERP</h1>
    <p>Sesión activa en: <span id="caja-activa"></span></p>
    <button class="btn btn-outline-danger" onclick="location.reload()">Cerrar Sistema</button>
</div>

<script>
/**
 * MOTOR DE CONEXIÓN BLINDADA - INGENIERÍA DE SOFTWARE
 */
const GuerreroEngine = (() => {
    const SURL = "https://tzseklsayxaldtqatwuq.supabase.co";
    const SKEY = "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5";
    let supabaseClient = null;

    // Inicialización con reintento automático
    const start = async () => {
        const bar = document.getElementById('status-bar');
        const btn = document.getElementById('btn-login');

        try {
            // Wait-Loop: Espera a que el SDK esté disponible en el objeto window
            let retries = 0;
            while (!window.supabase && retries < 15) {
                await new Promise(res => setTimeout(res, 400));
                retries++;
            }

            if (!window.supabase) throw new Error("SDK no detectado");

            // Crear cliente
            supabaseClient = window.supabase.createClient(SURL, SKEY);
            
            // Éxito: Activar interfaz
            bar.className = "status-msg alert-success text-success";
            bar.innerHTML = "✅ Sistema Conectado y Seguro";
            btn.disabled = false;
            btn.innerText = "INICIAR TURNO 5H";

        } catch (e) {
            bar.className = "status-msg alert-danger text-danger";
            bar.innerHTML = "❌ Error Crítico: SDK no detectado";
            console.error("Kernel Error:", e);
        }
    };

    const login = async () => {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;
        const btn = document.getElementById('btn-login');

        btn.disabled = true;
        btn.innerText = "VALIDANDO...";

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });

        if (error) {
            alert("Acceso Denegado: " + error.message);
            btn.disabled = false;
            btn.innerText = "INICIAR TURNO 5H";
        } else {
            document.getElementById('caja-activa').innerText = document.getElementById('select_caja').value;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }
    };

    window.addEventListener('load', start);
    return { login };
})();
</script>
</body>
</html>
