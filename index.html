<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUERRERO ERP - Auditoría de Núcleo</title>

    <!-- 1. CARGA DE SEGURIDAD (Si falla la red, el sistema avisará) -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">

    <style>
        :root { --g-red: #e31e24; --g-dark: #2c3e50; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #fff; padding: 40px; border-radius: 25px; width: 100%; max-width: 440px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        /* Barra de Progreso de Ingeniería */
        .progress { height: 12px; background: #e9ecef; border-radius: 20px; overflow: hidden; }
        .progress-bar { background: var(--g-red); transition: width 0.3s; }
        
        /* Auditoría Visual (Caja Negra) */
        .audit-terminal { background: #111; color: #00ff41; font-family: monospace; font-size: 0.7rem; padding: 12px; border-radius: 12px; height: 100px; overflow-y: auto; border: 1px solid #333; margin-bottom: 20px; }
        .audit-terminal span { display: block; margin-bottom: 2px; }
        
        #access-ui { opacity: 0.2; pointer-events: none; transition: opacity 0.5s ease; }
    </style>
</head>
<body>

<div class="login-card shadow-lg">
    <h3 class="fw-bold text-danger text-center mb-4">GUERRERO ERP</h3>
    
    <div class="d-flex justify-content-between small text-muted mb-1">
        <span id="load-status">Sincronizando núcleo...</span>
        <span id="load-perc">0%</span>
    </div>
    <div class="progress mb-3">
        <div id="main-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
    </div>

    <!-- TERMINAL DE AUDITORÍA EN TIEMPO REAL -->
    <div id="audit-log" class="audit-terminal">
        <span>[SYSTEM] Iniciando auditoría de red móvil...</span>
    </div>

    <div id="access-ui">
        <select id="select_caja" class="form-select mb-3">
            <optgroup label="Caja 1"><option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option><option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option></optgroup>
            <optgroup label="Caja 2"><option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option><option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option></optgroup>
            <optgroup label="Caja 3"><option value="Caja 3 Mañana">☀️ Caja 3 - Mañana</option><option value="Caja 3 Tarde">🌙 Caja 3 - Tarde</option></optgroup>
            <optgroup label="Caja 4"><option value="Caja 4 Mañana">☀️ Caja 4 - Mañana</option><option value="Caja 4 Tarde">🌙 Caja 4 - Tarde</option></optgroup>
        </select>
        <input type="email" id="log_user" class="form-control mb-2" placeholder="usuario@correo.com">
        <input type="password" id="log_pass" class="form-control mb-4" placeholder="••••••••">
        <button id="btn-login" class="btn btn-danger w-100 py-3 fw-bold shadow" onclick="GuerreroEngine.login()" disabled>CONECTANDO...</button>
    </div>
</div>

<script>
/**
 * MOTOR DE RESILIENCIA Y AUDITORÍA - GUERRERO V15
 */
const GuerreroEngine = (() => {
    const CONFIG = {
        URL: "https://tzseklsayxaldtqatwuq.supabase.co",
        KEY: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    let client = null;

    const log = (msg) => {
        const terminal = document.getElementById('audit-log');
        terminal.innerHTML += `<span>[AUDIT] ${msg}</span>`;
        terminal.scrollTop = terminal.scrollHeight;
    };

    const updateUI = (perc, status) => {
        document.getElementById('main-bar').style.width = perc + '%';
        document.getElementById('load-perc').innerText = perc + '%';
        document.getElementById('load-status').innerText = status;
    };

    const boot = async () => {
        log("Probando conectividad con Supabase...");
        updateUI(25, "Analizando RED...");

        // Verificación de existencia del SDK (Poll Pattern)
        let retries = 0;
        while (!window.supabase && retries < 15) {
            log(`Reintento de detección SDK ${retries + 1}...`);
            await new Promise(r => setTimeout(r, 400));
            retries++;
        }

        if (window.supabase) {
            updateUI(70, "Cargando Cliente...");
            try {
                client = window.supabase.createClient(CONFIG.URL, CONFIG.KEY);
                log("Conexión con Supabase Establecida.");
                updateUI(100, "Núcleo Listo");
                
                // Desbloqueo de interfaz
                document.getElementById('access-ui').style.opacity = "1";
                document.getElementById('access-ui').style.pointerEvents = "auto";
                document.getElementById('btn-login').disabled = false;
                document.getElementById('btn-login').innerText = "INICIAR TURNO 5H";
            } catch (err) {
                log("Fallo crítico en configuración de cliente.");
            }
        } else {
            updateUI(0, "Error de SDK");
            log("ERROR CRÍTICO: Red Bloqueada (DNS/Firewall).");
            alert("Bloqueo Detectado. Use WiFi o cambie a un navegador sin extensiones.");
        }
    };

    const login = async () => {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;
        const caja = document.getElementById('select_caja').value;
        const btn = document.getElementById('btn-login');

        btn.disabled = true;
        btn.innerText = "VALIDANDO ACCESO...";
        log(`Validando credenciales para: ${email}`);

        try {
            const { data, error } = await client.auth.signInWithPassword({ email, password: pass });

            if (error) {
                log(`Acceso denegado: ${error.message}`);
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "REINTENTAR";
            } else {
                log("Acceso concedido. Registrando auditoría de turno...");
                // Registro de auditoría
                await client.from('auditoria_logins').insert([{ cajero: email, caja: caja, fecha: new Date().toISOString() }]);
                log("Redirigiendo...");
                // Aquí va la lógica para entrar a la aplicación
            }
        } catch (e) {
            log("Error de conexión durante el login.");
            btn.disabled = false;
        }
    };

    window.addEventListener('DOMContentLoaded', boot);
    return { login };
})();
</script>
</body>
</html>
