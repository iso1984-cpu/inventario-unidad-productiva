<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP v15 - Sistema Pro</title>

    <!-- LIBRERÍAS CRÍTICAS -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <script src="https://cdn.sheetjs.com"></script>

    <style>
        :root { --g-red: #e31e24; --g-dark: #2c3e50; }
        body { background-color: #f1f3f5; font-family: 'Inter', sans-serif; }
        .login-screen { position: fixed; inset: 0; background: #f1f3f5; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .sidebar { background: var(--g-dark); color: white; min-height: 100vh; width: 260px; position: fixed; padding: 20px 0; }
        main { margin-left: 260px; padding: 30px; }
        .pos-panel { display: none; }
        .pos-panel.active { display: block; }
        #btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO -->
<div id="login-screen" class="login-screen">
    <div class="card shadow-lg p-5 text-center" style="width: 450px; border-radius: 20px;">
        <h3 class="fw-bold text-danger mb-2">GUERRERO ERP</h3>
        <p id="status-carga" class="small text-muted mb-4">⏳ Cargando base de datos...</p>
        
        <select id="select_caja" class="form-select mb-3">
            <optgroup label="Caja 1"><option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option><option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option></optgroup>
            <optgroup label="Caja 2"><option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option><option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option></optgroup>
            <optgroup label="Caja 3"><option value="Caja 3 Mañana">☀️ Caja 3 - Mañana</option><option value="Caja 3 Tarde">🌙 Caja 3 - Tarde</option></optgroup>
            <optgroup label="Caja 4"><option value="Caja 4 Mañana">☀️ Caja 4 - Mañana</option><option value="Caja 4 Tarde">🌙 Caja 4 - Tarde</option></optgroup>
        </select>

        <input type="email" id="log_user" class="form-control mb-2" placeholder="sarita.6421@gmail.com">
        <input type="password" id="log_pass" class="form-control mb-4" placeholder="Contraseña">
        
        <!-- Botón deshabilitado inicialmente -->
        <button id="btn-login" class="btn btn-danger w-100 py-3 fw-bold" onclick="login()" disabled>
            INICIAR TURNO 5H
        </button>
    </div>
</div>

<div id="app" style="display:none;">
    <aside class="sidebar shadow">
        <div class="px-4 mb-5 text-center text-white"><h4>GUERRERO</h4></div>
        <nav class="nav flex-column">
            <a class="nav-link text-white active" href="#" onclick="showPanel('p-ventas')">🛒 Ventas</a>
            <a class="nav-link text-white" href="#" onclick="showPanel('p-inventario')">📦 Inventario</a>
        </nav>
        <hr>
        <div class="text-center px-3">
            <div id="label-caja" class="badge bg-danger mb-2 p-2 w-100">---</div>
            <div id="timer-h" class="bg-dark text-white p-2 rounded mb-2 fw-bold">05:00:00</div>
        </div>
    </aside>

    <main>
        <div id="p-ventas" class="pos-panel active">
            <div class="row">
                <div class="col-8">
                    <input type="text" id="scan_out" class="form-control mb-3" placeholder="Escanear producto..." onkeypress="handleVenta(event)">
                    <table class="table bg-white rounded shadow-sm">
                        <thead><tr><th>Producto</th><th>Precio</th><th>Acción</th></tr></thead>
                        <tbody id="list-v"></tbody>
                    </table>
                </div>
                <div class="col-4 text-center">
                    <div class="card p-4 shadow-sm">
                        <h5>TOTAL</h5>
                        <h2 class="text-success fw-bold">$<span id="total-v">0</span></h2>
                        <button class="btn btn-success w-100 py-3 mt-3" onclick="finalizarVenta()">REGISTRAR VENTA</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="p-inventario" class="pos-panel">
            <div class="card p-4 shadow-sm">
                <button class="btn btn-outline-success btn-sm mb-3" onclick="exportarExcel()">Exportar Excel</button>
                <table class="table table-sm"><tbody id="list-inv"></tbody></table>
            </div>
        </div>
    </main>
</div>

<script>
    const SURL = "https://tzseklsayxaldtqatwuq.supabase.co";
    const SKEY = "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5";
    let supabase, carrito = [], cajaId = "", tiempo = 18000;

    // ✅ CORRECCIÓN RADICAL: Activar botón solo cuando Supabase esté listo
    window.onload = () => {
        try {
            if (window.supabase) {
                supabase = window.supabase.createClient(SURL, SKEY);
                document.getElementById('btn-login').disabled = false;
                document.getElementById('status-carga').innerText = "✅ Sistema Listo";
                document.getElementById('status-carga').className = "small text-success mb-4";
            }
        } catch (e) {
            document.getElementById('status-carga').innerText = "❌ Error de conexión";
        }
    };

    async function login() {
        cajaId = document.getElementById('select_caja').value;
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;

        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
        
        if (error) {
            alert("Error: " + error.message);
        } else {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('label-caja').innerText = cajaId;
            iniciarContador();
        }
    }

    function iniciarContador() {
        setInterval(() => {
            if (tiempo > 0) {
                tiempo--;
                let h = Math.floor(tiempo/3600), m = Math.floor((tiempo%3600)/60), s = tiempo%60;
                document.getElementById('timer-h').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }, 1000);
    }

    async function handleVenta(e) {
        if (e.key === 'Enter') {
            const { data } = await supabase.from('productos').select('*').eq('ean', e.target.value).single();
            if (data && data.stock > 0) { carrito.push(data); renderCarrito(); }
            e.target.value = "";
        }
    }

    function renderCarrito() {
        let total = 0;
        document.getElementById('list-v').innerHTML = carrito.map((p, i) => {
            total += p.precio1;
            return `<tr><td>${p.nombre}</td><td>$${p.precio1}</td><td><button class="btn btn-sm btn-danger" onclick="carrito.splice(${i},1);renderCarrito()">X</button></td></tr>`;
        }).join('');
        document.getElementById('total-v').innerText = total;
    }

    async function finalizarVenta() {
        for (let p of carrito) {
            const { data } = await supabase.from('productos').select('stock').eq('ean', p.ean).single();
            await supabase.from('productos').update({ stock: data.stock - 1 }).eq('ean', p.ean);
        }
        alert("Venta registrada.");
        carrito = []; renderCarrito();
    }

    function showPanel(id) {
        document.querySelectorAll('.pos-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
