<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GUERRERO ERP v2.4.0</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #1a1a1a; --g-light: #f4f7f6; }
        body { background: var(--g-dark); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        
        /* LOGIN - Estructura abierta para que el select se vea completo */
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { 
            background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; z-index: 999;
        }
        
        /* SELECTOR DE CAJAS - Estilo resaltado */
        #select-caja { border: 2px solid var(--g-red); font-weight: bold; height: 50px; cursor: pointer; }
        
        /* APP PRINCIPAL */
        #main-app { display: none; background: var(--g-light); min-height: 100vh; }
        .sidebar { background: var(--g-dark); color: white; width: 260px; height: 100vh; position: fixed; z-index: 1000; }
        main { margin-left: 260px; padding: 30px; }
        
        /* FILAS DE REMISIÓN */
        .item-row { 
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 45px; gap: 15px; 
            align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: white; 
        }
        #results { position: absolute; width: 100%; z-index: 2000; background: white; border: 1px solid #ddd; max-height: 250px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card text-center">
        <h3 class="fw-bold mb-1">GUERRERO <span class="text-danger">ERP</span></h3>
        <p class="small text-muted mb-4">v2.4.0 | Validación Supabase</p>
        
        <div class="mb-3 text-start">
            <label class="small fw-bold text-uppercase mb-1">Punto de Operación:</label>
            <select id="select-caja" class="form-select mb-3">
                <option value="Caja 1 - Mañana">Caja 1 - Mañana</option>
                <option value="Caja 1 - Tarde">Caja 1 - Tarde</option>
                <option value="Caja 2 - Mañana">Caja 2 - Mañana</option>
                <option value="Caja 2 - Tarde">Caja 2 - Tarde</option>
                <option value="Caja 3 - Mañana">Caja 3 - Mañana</option>
                <option value="Caja 3 - Tarde">Caja 3 - Tarde</option>
                <option value="Caja 4 - Mañana">Caja 4 - Mañana</option>
                <option value="Caja 4 - Tarde">Caja 4 - Tarde</option>
            </select>
        </div>

        <div class="text-start mb-4">
            <input type="text" id="user-email" class="form-control mb-2 py-2" placeholder="Usuario / Correo">
            <input type="password" id="user-pass" class="form-control py-2" placeholder="Contraseña">
        </div>
        
        <button id="btn-login" class="btn btn-danger w-100 fw-bold py-3 shadow" onclick="login()">INGRESAR</button>
    </div>
</div>

<div id="main-app">
    <!-- Sidebar y Contenido Principal se mantienen con la lógica de remisiones -->
    <div class="sidebar p-4">
        <h4 class="fw-bold text-danger border-bottom pb-3 mb-4">G-ERP</h4>
        <div class="nav flex-column">
            <a class="nav-link text-white py-2" href="#" onclick="cambiarModulo('SALIDA')">📦 Remisión Salida</a>
            <a class="nav-link text-white-50 py-2" href="#" onclick="cambiarModulo('ENTRADA')">📥 Remisión Entrada</a>
            <hr class="text-secondary">
            <div id="info-usuario" class="small text-warning mb-2">Usuario: ---</div>
            <div id="terminal-info" class="badge bg-danger p-2 w-100 text-uppercase">Caja no asignada</div>
        </div>
    </div>
    
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="modulo-title" class="fw-bold">Remisión de Salida</h2>
            <div id="reloj" class="h4 font-monospace text-danger">00:00:00</div>
        </div>
        
        <div class="row">
            <div class="col-md-9 bg-white rounded-4 shadow-sm p-4">
                <div class="position-relative">
                    <input type="text" id="buscador" class="form-control form-control-lg border-danger" placeholder="Buscar por nombre o EAN..." oninput="buscar(this.value)">
                    <div id="results" class="list-group shadow-lg" style="display:none;"></div>
                </div>
                <div id="lista" class="mt-4"></div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm p-4 text-center">
                    <span class="text-secondary small fw-bold">TOTAL REMISIÓN</span>
                    <h2 class="fw-bold text-danger mt-2">$<span id="total">0</span></h2>
                    <button class="btn btn-danger btn-lg w-100 mt-4 rounded-pill py-3 fw-bold" onclick="finalizar()">FINALIZAR</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const VAULT = { 
        U: "https://tzseklsayxaldtqatwuq.supabase.co", 
        K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5" 
    };
    const headers = { 'apikey': VAULT.K, 'Authorization': `Bearer ${VAULT.K}`, 'Content-Type': 'application/json' };
    
    let cart = [], modulo = 'SALIDA', cajaActual = '', usuarioLogueado = '';

    // --- PASO 1: LOGIN CONSULTANDO TABLA 'USUARIOS' ---
    async function login() {
        const email = document.getElementById('user-email').value.trim();
        const pass = document.getElementById('user-pass').value.trim();
        const btn = document.getElementById('btn-login');
        
        if(!email || !pass) return alert("Complete los campos");
        
        btn.innerText = "VALIDANDO...";
        btn.disabled = true;

        try {
            // Consulta directa a tu tabla 'usuarios'
            const res = await fetch(`${VAULT.U}/rest/v1/usuarios?correo=eq.${email}&clave=eq.${pass}&select=*`, { headers });
            const data = await res.json();

            if (data.length > 0) {
                usuarioLogueado = data[0].nombre || data[0].correo;
                cajaActual = document.getElementById('select-caja').value;
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('terminal-info').innerText = cajaActual;
                document.getElementById('info-usuario').innerText = "Usuario: " + usuarioLogueado;
            } else {
                alert("Acceso Denegado: Usuario o Clave no coinciden en la base de datos.");
            }
        } catch (e) {
            alert("Error de conexión con el servidor.");
        } finally {
            btn.innerText = "INGRESAR";
            btn.disabled = false;
        }
    }

    // --- PASO 2: BÚSQUEDA DUAL ---
    async function buscar(v) {
        if(v.length < 2) { document.getElementById('results').style.display='none'; return; }
        const r = await fetch(`${VAULT.U}/rest/v1/productos?or=(nombre.ilike.*${v}*,ean.eq.${v})&select=*`, { headers });
        const d = await r.json();
        document.getElementById('results').innerHTML = d.map(x => `
            <button onclick='add(${JSON.stringify(x)})' class="list-group-item list-group-item-action d-flex justify-content-between">
                <span><b>${x.nombre}</b> <small>(Stock: ${x.stock})</small></span>
                <span class="text-danger fw-bold">$${x.precio1}</span>
            </button>`).join('');
        document.getElementById('results').style.display='block';
    }

    function add(x) {
        cart.push({...x, qty: 1});
        document.getElementById('results').style.display='none';
        document.getElementById('buscador').value = '';
        render();
    }

    function render() {
        let t = 0;
        document.getElementById('lista').innerHTML = cart.map((x, i) => {
            const sub = x.precio1 * x.qty;
            t += sub;
            return `<div class="item-row">
                <span class="fw-bold">${x.nombre}</span>
                <input type="number" class="form-control" value="${x.precio1}" onchange="cart[${i}].precio1=this.value;render()">
                <input type="number" class="form-control" value="${x.qty}" onchange="cart[${i}].qty=this.value;render()">
                <b class="text-end text-danger">$${sub.toLocaleString()}</b>
                <button class="btn btn-sm btn-outline-secondary" onclick="cart.splice(${i},1);render()">×</button>
            </div>`;
        }).join('');
        document.getElementById('total').innerText = t.toLocaleString();
    }

    async function finalizar() {
        if(!cart.length) return alert("No hay productos");
        if(!confirm("¿Finalizar esta Remisión de " + modulo + "?")) return;

        for(let x of cart) {
            const tabla = modulo === 'SALIDA' ? 'salidas' : 'entradas';
            // Guardar remisión
            await fetch(`${VAULT.U}/rest/v1/${tabla}`, { 
                method: 'POST', headers, 
                body: JSON.stringify({ 
                    producto: x.nombre, 
                    monto: x.precio1 * x.qty, 
                    fecha: new Date().toISOString(), 
                    terminal: cajaActual,
                    usuario: usuarioLogueado
                }) 
            });
            // Actualizar Inventario
            const st = modulo === 'SALIDA' ? (x.stock - x.qty) : (parseInt(x.stock) + parseInt(x.qty));
            await fetch(`${VAULT.U}/rest/v1/productos?id=eq.${x.id}`, { 
                method: 'PATCH', headers, body: JSON.stringify({ stock: st }) 
            });
        }
        alert("Remisión Guardada Correctamente");
        location.reload();
    }

    function cambiarModulo(m) { 
        modulo = m; 
        document.getElementById('modulo-title').innerText = `Remisión de ${m}`;
        document.querySelectorAll('.nav-link').forEach(n => n.classList.add('text-white-50'));
        event.currentTarget.classList.remove('text-white-50');
        event.currentTarget.classList.add('text-white');
        cart = []; render(); 
    }

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
