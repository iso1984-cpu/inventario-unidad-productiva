<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP v15 - Blindaje de Ingeniería</title>

    <!-- BOOTSTRAP PRIORITARIO -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">

    <style>
        :root { --g-red: #e31e24; --g-dark: #2c3e50; }
        body { background-color: #f1f3f5; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 45px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 100%; max-width: 460px; text-align: center; }
        .status-badge { font-size: 0.8rem; padding: 10px; border-radius: 10px; margin-bottom: 25px; font-weight: 700; transition: all 0.3s; }
        #app { display: none; position: fixed; inset: 0; background: white; z-index: 10000; padding: 30px; }
        .btn-g { padding: 14px; font-weight: 700; letter-spacing: 0.5px; border-radius: 12px; }
    </style>
</head>
<body>

<div id="login-screen" class="login-card">
    <h3 class="fw-bold text-danger mb-4">GUERRERO ERP</h3>
    
    <!-- Monitor de Sistema Blindado -->
    <div id="status-bar" class="status-badge alert-secondary text-muted">
        <span class="spinner-border spinner-border-sm me-2"></span> INYECTANDO NÚCLEO...
    </div>

    <select id="select_caja" class="form-select mb-3 py-2">
        <optgroup label="Caja 1"><option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option><option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option></optgroup>
        <optgroup label="Caja 2"><option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option><option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option></optgroup>
        <optgroup label="Caja 3"><option value="Caja 3 Mañana">☀️ Caja 3 - Mañana</option><option value="Caja 3 Tarde">🌙 Caja 3 - Tarde</option></optgroup>
        <optgroup label="Caja 4"><option value="Caja 4 Mañana">☀️ Caja 4 - Mañana</option><option value="Caja 4 Tarde">🌙 Caja 4 - Tarde</option></optgroup>
    </select>

    <input type="email" id="log_user" class="form-control mb-2 py-2" placeholder="sarita.6421@gmail.com">
    <input type="password" id="log_pass" class="form-control mb-4 py-2" placeholder="••••••••">
    
    <button id="btn-login" class="btn btn-danger w-100 btn-g shadow" onclick="GuerreroApp.login()" disabled>
        CARGANDO SISTEMA...
    </button>
</div>

<div id="app">
    <h2 class="text-danger fw-bold">PANEL DE CONTROL ACTIVO</h2>
    <div class="alert alert-success">Sesión Auditorada en: <b id="caja-display"></b></div>
    <button class="btn btn-dark" onclick="location.reload()">Finalizar Turno</button>
</div>

<script>
/**
 * GUERRERO CORE ENGINE - ARQUITECTURA RESILIENTE
 */
const GuerreroApp = (() => {
    const CONFIG = {
        SURL: "https://tzseklsayxaldtqatwuq.supabase.co",
        SKEY: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    let client = null;

    // INYECCIÓN DINÁMICA DE SDK (Solución Radical)
    const injectSDK = () => {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net";
            script.onload = () => resolve(true);
            script.onerror = () => resolve(false);
            document.head.appendChild(script);
        });
    };

    const init = async () => {
        const bar = document.getElementById('status-bar');
        const btn = document.getElementById('btn-login');

        // Intento 1: Inyectar
        await injectSDK();

        // Verificación de existencia (Poll Pattern)
        let ready = false;
        for (let i = 0; i < 15; i++) {
            if (window.supabase) { ready = true; break; }
            await new Promise(r => setTimeout(r, 400));
            console.log(`[Engine] Sincronizando... Intento ${i+1}`);
        }

        if (ready) {
            client = window.supabase.createClient(CONFIG.SURL, CONFIG.SKEY);
            bar.className = "status-badge alert-success text-success";
            bar.innerHTML = "✅ NÚCLEO SINCRONIZADO Y SEGURO";
            btn.disabled = false;
            btn.innerText = "INICIAR TURNO 5H";
        } else {
            bar.className = "status-badge alert-danger text-danger";
            bar.innerHTML = "❌ ERROR: SDK BLOQUEADO POR EL NAVEGADOR";
        }
    };

    const login = async () => {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;
        const caja = document.getElementById('select_caja').value;
        const btn = document.getElementById('btn-login');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>AUDITANDO ACCESO...';

        try {
            const { data, error } = await client.auth.signInWithPassword({ email, password: pass });
            if (error) throw error;

            // --- SISTEMA DE AUDITORÍA (Registro en Tabla 'auditoria_logins') ---
            await client.from('auditoria_logins').insert([
                { cajero: email, caja: caja, fecha: new Date().toISOString(), accion: "INICIO_TURNO" }
            ]);

            document.getElementById('caja-display').innerText = caja;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';

        } catch (e) {
            alert("Error de Auditoría: " + e.message);
            btn.disabled = false;
            btn.innerText = "INICIAR TURNO 5H";
        }
    };

    window.onload = init;
    return { login };
})();
</script>
</body>
</html>
