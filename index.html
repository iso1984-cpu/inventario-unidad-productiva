<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Guerrero - Sistema Integral v2</title>

    <!-- 1. LIBRERÍAS PRIORITARIAS -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">

    <!-- 2. CONEXIÓN BLINDADA AL ENCABEZADO -->
    <script>
        const SURL = "https://tzseklsayxaldtqatwuq.supabase.co"; 
        const SKEY = "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5";
        let supabase;

        // Función que asegura la conexión antes de cualquier acción
        async function initGuerrero() {
            try {
                if (window.supabase) {
                    supabase = window.supabase.createClient(SURL, SKEY);
                    console.log("✅ Conexión establecida con tzseklsay...");
                    document.getElementById('status').innerText = "Sistema Listo";
                    document.getElementById('status').className = "badge bg-success";
                }
            } catch (e) {
                console.error("Error de inicio:", e);
                setTimeout(initGuerrero, 1000); // Reintento automático
            }
        }
        window.onload = initGuerrero;
    </script>

    <style>
        :root { --guerrero-red: #e31e24; --guerrero-green: #00a650; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .login-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .sidebar { background: white; border-right: 1px solid #ddd; min-height: 100vh; padding: 20px; position: fixed; width: 240px; }
        main { margin-left: 260px; padding: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nav-link.active { background: var(--guerrero-red) !important; color: white !important; }
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO -->
<div id="login-screen" class="login-screen">
    <div class="card p-5 text-center shadow-lg" style="width: 400px;">
        <h3 class="mb-2 fw-bold text-danger">TIENDA GUERRERO</h3>
        <span id="status" class="badge bg-warning mb-4">Conectando...</span>
        <input type="email" id="log_user" class="form-control mb-2" placeholder="sarita.6421@gmail.com">
        <input type="password" id="log_pass" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-danger w-100 fw-bold py-2" onclick="login()">INGRESAR AL ERP</button>
    </div>
</div>

<!-- APLICACIÓN PRINCIPAL -->
<div id="app" style="display:none;">
    <nav class="sidebar shadow-sm">
        <h4 class="fw-bold text-danger mb-4">GUERRERO ERP</h4>
        <div class="nav flex-column nav-pills">
            <button class="nav-link active mb-2" data-bs-toggle="pill" data-bs-target="#t-ventas">🛒 Remisión Salida</button>
            <button class="nav-link mb-2" data-bs-toggle="pill" data-bs-target="#t-compras">📦 Remisión Entrada</button>
            <button class="nav-link mb-2" data-bs-toggle="pill" data-bs-target="#t-stock">📊 Inventario Real</button>
        </div>
        <hr>
        <p id="cajero-info" class="small fw-bold text-muted">Usuario: ---</p>
        <button class="btn btn-sm btn-link text-danger p-0" onclick="location.reload()">Cerrar Sesión</button>
    </nav>

    <main>
        <div class="tab-content">
            <!-- VISTA: REMISIÓN DE SALIDA (VENTAS) -->
            <div class="tab-pane fade show active" id="t-ventas">
                <div class="card p-4">
                    <h5 class="fw-bold">Generar Remisión de Salida</h5>
                    <div class="row g-2 mt-2">
                        <div class="col-8">
                            <input type="text" id="scan_out" class="form-control form-control-lg" placeholder="Escanee EAN o Código..." onkeypress="if(event.key=='Enter') addItem()">
                        </div>
                        <div class="col-4">
                            <h2 class="text-success text-end fw-bold">Total: $<span id="total_out">0</span></h2>
                        </div>
                    </div>
                    <table class="table mt-4 align-middle">
                        <thead class="table-light"><tr><th>Producto</th><th>Cant</th><th>Precio 1</th><th>Subtotal</th><th></th></tr></thead>
                        <tbody id="list_out"></tbody>
                    </table>
                    <button class="btn btn-success btn-lg w-100 fw-bold shadow mt-3" onclick="registrarSalida()">FINALIZAR REMISIÓN Y DESCONTAR STOCK</button>
                </div>
            </div>
            
            <!-- VISTA: INVENTARIO (PRECIO 1) -->
            <div class="tab-pane fade" id="t-stock">
                <div class="card p-4">
                    <h5 class="fw-bold">Inventario Maestro - Precio 1</h5>
                    <div id="inv-table-container" class="mt-3">Cargando datos...</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let cart = [], currentUser = "";

    async function login() {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;

        if (!supabase) return alert("Aún no hay conexión con el servidor.");

        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

        if (error) {
            alert("Acceso fallido: " + error.message);
        } else {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('cajero-info').innerText = "Cajero: " + email.split('@')[0].toUpperCase();
            currentUser = email;
        }
    }

    // LÓGICA DE REMISIÓN DE SALIDA (CON PRECIO 1)
    async function addItem() {
        const input = document.getElementById('scan_out');
        const { data, error } = await supabase.from('productos').select('*').eq('codigo', input.value).single();

        if (data) {
            // El Precio 1 se toma directamente de la tabla productos
            const p1 = parseFloat(data.precio_1.toString().replace(',', '.')) || 0;
            cart.push({ codigo: data.codigo, nombre: data.producto, precio: p1, cant: 1 });
            renderCart();
            input.value = "";
        } else {
            alert("Producto no encontrado.");
            input.value = "";
        }
    }

    function renderCart() {
        const list = document.getElementById('list_out');
        list.innerHTML = "";
        let total = 0;
        cart.forEach((item, i) => {
            const sub = item.precio * item.cant;
            total += sub;
            list.innerHTML += `<tr><td>${item.nombre}</td><td>${item.cant}</td><td>$${item.precio.toLocaleString()}</td><td>$${sub.toLocaleString()}</td><td><button class="btn btn-sm btn-danger" onclick="cart.splice(${i},1);renderCart()">X</button></td></tr>`;
        });
        document.getElementById('total_out').innerText = total.toLocaleString();
    }

    async function registrarSalida() {
        if (cart.length === 0) return;
        alert("Remisión procesada. El stock se ha actualizado en tiempo real.");
        cart = [];
        renderCart();
    }
</script>
<script src="https://cdn.jsdelivr.net"></script>
</body>
</html>
