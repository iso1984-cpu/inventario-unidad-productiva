<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP - Operación Total</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #0f172a; }
        body { background: #f1f5f9; font-family: sans-serif; margin: 0; }

        /* CAPA DE BIENVENIDA (La barrera) */
        #capa-inicio { 
            position: fixed; inset: 0; background: white; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; text-align: center;
        }

        /* CAPA DEL ERP (El contenido) */
        #capa-erp { display: none; } /* ESTO ES LO QUE SE ACTIVA AL DAR CLIC */

        .sidebar { background: var(--g-dark); color: white; min-height: 100vh; width: 250px; position: fixed; padding: 20px; }
        main { margin-left: 260px; padding: 30px; }
    </style>
</head>
<body>

<!-- 1. PANTALLA DE INICIO (CAPA 1) -->
<div id="capa-inicio">
    <div class="card p-5 shadow-lg border-0" style="max-width: 450px; border-radius: 25px;">
        <h3 class="text-danger fw-bold mb-4">GUERRERO ERP</h3>
        <p class="fw-bold fs-5">"Les agradecemos por ser parte de nuestro equipo. Que Dios los bendiga y que el turno sea un éxito."</p>
        <hr>
        <button class="btn btn-danger w-100 py-3 fw-bold fs-5 shadow" onclick="arrancarSistema()">
            ARRANCAR SISTEMA
        </button>
    </div>
</div>

<!-- 2. PANEL OPERATIVO (CAPA 2) -->
<div id="capa-erp">
    <aside class="sidebar">
        <h4 class="text-white fw-bold mb-4">GUERRERO</h4>
        <nav class="nav flex-column">
            <button class="btn btn-danger mb-2 w-100 text-start" onclick="verMod('ventas')">🛒 Ventas</button>
            <button class="btn btn-outline-light mb-2 w-100 text-start" onclick="verMod('inventario')">📦 Inventario</button>
        </nav>
        <div class="mt-5 text-center">
            <div class="badge bg-danger p-2 w-100 mb-2">CAJA 1 MAÑANA</div>
            <h2 id="reloj" class="fw-bold font-monospace">05:00:00</h2>
        </div>
    </aside>

    <main>
        <div id="mod-ventas" class="card p-4 shadow-sm">
            <h5 class="fw-bold text-danger mb-3">Módulo de Ventas Activo</h5>
            <input type="text" class="form-control mb-3" placeholder="Escanear producto...">
            <h2 class="text-success fw-bold">TOTAL: $0</h2>
        </div>

        <div id="mod-inventario" class="card p-4 shadow-sm mt-4" style="display:none;">
            <h5 class="fw-bold mb-3">Stock Real Supabase</h5>
            <table class="table"><thead><tr><th>EAN</th><th>Producto</th><th>Stock</th></tr></thead><tbody id="lista-inv"></tbody></table>
        </div>
    </main>
</div>

<script>
    let segundos = 18000;

    // ESTA FUNCIÓN ES EL "SALTO" QUE SOLUCIONA EL PROBLEMA
    function arrancarSistema() {
        // Ocultamos la bienvenida y mostramos el ERP
        document.getElementById('capa-inicio').style.display = 'none';
        document.getElementById('capa-erp').style.display = 'block';

        // Iniciamos el reloj de 5 horas
        setInterval(() => {
            if (segundos > 0) {
                segundos--;
                let h = Math.floor(segundos / 3600), m = Math.floor((segundos % 3600) / 60), s = segundos % 60;
                document.getElementById('reloj').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }, 1000);
    }

    function verMod(mod) {
        document.getElementById('mod-ventas').style.display = mod === 'ventas' ? 'block' : 'none';
        document.getElementById('mod-inventario').style.display = mod === 'inventario' ? 'block' : 'none';
        if(mod === 'inventario') {
             // Aquí iría tu fetch a Supabase para cargar la tabla
             document.getElementById('lista-inv').innerHTML = "<tr><td>770...</td><td>Producto Ejemplo</td><td>15</td></tr>";
        }
    }
</script>
</body>
</html>
