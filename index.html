<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP - Acceso Directo</title>
    <!-- Solo diseño básico -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        #app { display: none; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen" class="login-box">
    <h3 class="fw-bold text-danger mb-4">GUERRERO ERP</h3>
    
    <select id="caja" class="form-select mb-3">
        <option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option>
        <option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option>
        <option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option>
        <option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option>
    </select>

    <input type="email" id="user" class="form-control mb-2" placeholder="usuario@correo.com">
    <input type="password" id="pass" class="form-control mb-4" placeholder="Contraseña">
    
    <button id="btn" class="btn btn-danger w-100 py-2 fw-bold" onclick="entrar()">ENTRAR AL SISTEMA</button>
</div>

<div id="app">
    <h2 class="text-success">✅ ACCESO CONCEDIDO</h2>
    <p>Sesión activa en: <b id="caja-info"></b></p>
    <button class="btn btn-outline-secondary mt-4" onclick="location.reload()">Cerrar Sesión</button>
</div>

<script>
    // Conexión Directa a la API
    const API_URL = "https://tzseklsayxaldtqatwuq.supabase.co";
    const API_KEY = "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5";

    async function entrar() {
        const email = document.getElementById('user').value;
        const password = document.getElementById('pass').value;
        const cajaSel = document.getElementById('caja').value;
        const btn = document.getElementById('btn');

        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";

        try {
            // Petición nativa al motor de identidad (Fetch)
            const response = await fetch(`${API_URL}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Éxito: Ocultar login y mostrar app
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('caja-info').innerText = cajaSel;
            } else {
                alert("Acceso Incorrecto: " + (data.error_description || "Verifique datos"));
                btn.disabled = false;
                btn.innerText = "ENTRAR AL SISTEMA";
            }
        } catch (error) {
            alert("Error de conexión. Revise su internet o red móvil.");
            btn.disabled = false;
            btn.innerText = "ENTRAR AL SISTEMA";
        }
    }
</script>
</body>
</html>
