<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP v2.3.2</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <style>
        :root { --g-red: #e31e24; --g-dark: #1a1a1a; --g-light: #f8fafc; }
        body { background: var(--g-dark); font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Pantalla de Login - Forzar visibilidad */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
        .login-card { background: white; padding: 35px; border-radius: 20px; width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border-bottom: 5px solid var(--g-red); }
        
        /* Selector de Cajas - Estilo Aliaddo */
        .form-select-lg { border: 2px solid #dee2e6; transition: 0.3s; font-weight: bold; color: var(--g-red); }
        .form-select-lg:focus { border-color: var(--g-red); box-shadow: 0 0 0 0.25 mil rgba(227,30,36,0.2); }

        #main-app { display: none; background: var(--g-light); min-height: 100vh; }
        .sidebar { background: var(--g-dark); color: white; width: 260px; height: 100vh; position: fixed; }
        main { margin-left: 260px; padding: 30px; }
        
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 40px; gap: 15px; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card text-center">
        <h3 class="fw-bold mb-3">GUERRERO <span class="text-danger">ERP</span></h3>
        <p class="text-muted small mb-4">CONTROL DE REMISIONES v2.3.2</p>
        
        <!-- SELECTOR DE TURNOS: Ahora con altura fija para evitar cortes -->
        <div class="mb-3 text-start">
            <label class="small fw-bold text-uppercase mb-1">Caja y Horario:</label>
            <select id="select-caja" class="form-select form-select-lg mb-3">
                <option value="Caja 1 - Mañana">Caja 1 - Mañana</option>
                <option value="Caja 1 - Tarde">Caja 1 - Tarde</option>
                <option value="Caja 2 - Mañana">Caja 2 - Mañana</option>
                <option value="Caja 2 - Tarde">Caja 2 - Tarde</option>
                <option value="Caja 3 - Mañana">Caja 3 - Mañana</option>
                <option value="Caja 3 - Tarde">Caja 3 - Tarde</option>
                <option value="Caja 4 - Mañana">Caja 4 - Mañana</option>
                <option value="Caja 4 - Tarde">Caja 4 - Tarde</option>
            </select>
        </div>

        <input type="text" id="user-email" class="form-control mb-2 py-2" placeholder="Correo electrónico">
        <input type="password" id="user-pass" class="form-control mb-4 py-2" placeholder="Contraseña">
        
        <button class="btn btn-danger w-100 fw-bold py-3 shadow" onclick="login()">AUTENTICAR TURNO</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar p-4">
        <h4 class="fw-bold text-danger border-bottom pb-3 mb-4">G-ERP</h4>
        <div class="nav flex-column">
            <a class="nav-link text-white active" href="#" onclick="cambiarModulo('SALIDA')">📦 Remisión Salida</a>
            <a class="nav-link text-white-50" href="#" onclick="cambiarModulo('ENTRADA')">📥 Remisión Entrada</a>
            <hr>
            <p class="small text-secondary mb-1">Terminal Activa:</p>
            <div id="terminal-info" class="badge bg-danger p-2 w-100">Caja 1</div>
        </div>
    </div>
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="modulo-title" class="fw-bold">Remisión de Salida</h2>
            <div id="reloj" class="h4 font-monospace text-danger">00:00:00</div>
        </div>
        <div class="row">
            <div class="col-md-9 bg-white rounded-4 shadow-sm p-4">
                <input type="text" id="buscador" class="form-control form-control-lg border-danger mb-3" placeholder="Nombre o Código..." oninput="buscar(this.value)">
                <div id="results" class="list-group mb-3 position-absolute w-75 shadow-lg" style="z-index: 1000; display:none;"></div>
                <div id="lista" class="mt-4"></div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm p-4 text-center">
                    <span class="text-secondary small">VALOR TOTAL</span>
                    <h2 class="fw-bold text-danger mt-2">$<span id="total">0</span></h2>
                    <button class="btn btn-danger btn-lg w-100 mt-4 rounded-pill py-3" onclick="finalizar()">FINALIZAR</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const VAULT = { U: "https://tzseklsayxaldtqatwuq.supabase.co", K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5" };
    const headers = { 'apikey': VAULT.K, 'Authorization': `Bearer ${VAULT.K}`, 'Content-Type': 'application/json' };
    
    let cart = [], modulo = 'SALIDA', cajaActual = '';

    // --- CORRECCIÓN DE LOGIN ---
    function login() {
        const u = document.getElementById('user-email').value.trim().toLowerCase(); // Limpieza profunda
        const p = document.getElementById('user-pass').value.trim();
        cajaActual = document.getElementById('select-caja').value;

        // Validación exacta sin errores de formato
        if(u === "sarah.6421@gmail.com" && p === "guerrero2026") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('terminal-info').innerText = cajaActual;
        } else {
            alert("Acceso Denegado: Revise que no haya espacios adicionales.");
        }
    }

    async function buscar(v) {
        if(v.length < 2) { document.getElementById('results').style.display='none'; return; }
        const r = await fetch(`${VAULT.U}/rest/v1/productos?or=(nombre.ilike.*${v}*,ean.eq.${v})&select=*`, { headers });
        const d = await r.json();
        document.getElementById('results').innerHTML = d.map(x => `<button onclick='add(${JSON.stringify(x)})' class="list-group-item list-group-item-action"><b>${x.nombre}</b> - $${x.precio1}</button>`).join('');
        document.getElementById('results').style.display='block';
    }

    function add(x) {
        cart.push({...x, qty: 1});
        document.getElementById('results').style.display='none';
        document.getElementById('buscador').value = '';
        render();
    }

    function render() {
        let t = 0;
        document.getElementById('lista').innerHTML = cart.map((x, i) => {
            t += (x.precio1 * x.qty);
            return `<div class="item-row">
                <b>${x.nombre}</b>
                <input type="number" class="form-control" value="${x.precio1}" onchange="cart[${i}].precio1=this.value;render()">
                <input type="number" class="form-control" value="${x.qty}" onchange="cart[${i}].qty=this.value;render()">
                <b class="text-end">$${x.precio1 * x.qty}</b>
                <button class="btn btn-sm btn-light text-danger" onclick="cart.splice(${i},1);render()">×</button>
            </div>`;
        }).join('');
        document.getElementById('total').innerText = t.toLocaleString();
    }

    async function finalizar() {
        if(!cart.length) return;
        for(let x of cart) {
            const tabla = modulo === 'SALIDA' ? 'salidas' : 'entradas';
            await fetch(`${VAULT.U}/rest/v1/${tabla}`, { 
                method: 'POST', headers, 
                body: JSON.stringify({ producto: x.nombre, monto: x.precio1 * x.qty, fecha: new Date().toISOString(), terminal: cajaActual }) 
            });
            const st = modulo === 'SALIDA' ? (x.stock - x.qty) : (parseInt(x.stock) + parseInt(x.qty));
            await fetch(`${VAULT.U}/rest/v1/productos?id=eq.${x.id}`, { method: 'PATCH', headers, body: JSON.stringify({ stock: st }) });
        }
        alert("Operación Exitosa");
        location.reload();
    }

    function cambiarModulo(m) { 
        modulo = m; 
        document.getElementById('modulo-title').innerText = `Remisión de ${m}`;
        cart = []; render(); 
    }

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
