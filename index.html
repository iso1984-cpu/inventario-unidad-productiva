<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP v15 - Envío por Correo</title>

    <!-- LIBRERÍAS -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <script src="https://cdn.sheetjs.com"></script>
    
    <!-- EMAILJS (Para envío de correos) -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>

    <style>
        :root { --g-red: #e31e24; --g-dark: #2c3e50; }
        body { background-color: #f1f3f5; font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--g-dark); color: white; min-height: 100vh; width: 260px; position: fixed; padding: 20px 0; z-index: 1000; }
        .nav-link { color: #adb5bd; padding: 12px 25px; display: flex; align-items: center; cursor: pointer; border-left: 4px solid transparent; }
        .nav-link.active { color: white; background: rgba(255,255,255,0.1); border-left-color: var(--g-red); }
        main { margin-left: 260px; padding: 30px; }
        .pos-panel { display: none; }
        .pos-panel.active { display: block; }
        .card-g { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .login-screen { position: fixed; inset: 0; background: #f1f3f5; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .timer-badge { background: #333; color: #fff; padding: 5px 12px; border-radius: 15px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="card shadow-lg p-5 text-center" style="width: 450px; border-radius: 20px;">
        <h3 class="fw-bold text-danger mb-4">GUERRERO ERP</h3>
        <select id="select_caja" class="form-select mb-3">
            <option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option>
            <option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option>
            <option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option>
            <option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option>
            <option value="Caja 3 Mañana">☀️ Caja 3 - Mañana</option>
            <option value="Caja 3 Tarde">🌙 Caja 3 - Tarde</option>
            <option value="Caja 4 Mañana">☀️ Caja 4 - Mañana</option>
            <option value="Caja 4 Tarde">🌙 Caja 4 - Tarde</option>
        </select>
        <input type="email" id="log_user" class="form-control mb-2" placeholder="usuario@correo.com">
        <input type="password" id="log_pass" class="form-control mb-4" placeholder="Contraseña">
        <button class="btn btn-danger w-100 py-3 fw-bold" onclick="login()">INICIAR TURNO</button>
    </div>
</div>

<div id="app" style="display:none;">
    <aside class="sidebar shadow">
        <div class="px-4 mb-5 text-center"><h4 class="fw-bold text-white m-0">GUERRERO</h4></div>
        <nav>
            <div class="nav-link active" onclick="showPanel('p-ventas', this)"><i class="bi bi-cart3 me-2"></i> Ventas</div>
            <div class="nav-link" onclick="showPanel('p-inventario', this)"><i class="bi bi-list-check me-2"></i> Inventario</div>
        </nav>
        <hr>
        <div class="text-center px-3">
            <div class="badge bg-danger mb-2 px-3 py-2 w-100" id="label-caja">---</div>
            <div id="timer-h" class="timer-badge mb-2">05:00:00</div>
            <p id="cajero-name" class="small fw-bold mt-2 text-light">---</p>
        </div>
    </aside>

    <main>
        <div id="p-ventas" class="pos-panel active">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card-g p-4">
                        <input type="text" id="scan_out" class="form-control mb-4" placeholder="🔍 Escanear producto..." onkeypress="handleVenta(event)">
                        <table class="table">
                            <thead><tr><th>Producto</th><th>Cant.</th><th>Total</th><th>Acción</th></tr></thead>
                            <tbody id="list-v"></tbody>
                        </table>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card-g p-4 text-center">
                        <small>TOTAL</small>
                        <h1 class="text-success fw-bold">$<span id="total-v">0</span></h1>
                        <button id="btn-venta" class="btn btn-success w-100 py-3 fw-bold" onclick="finalizarVenta()">FINALIZAR Y ENVIAR</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Inventario igual al anterior... -->
    </main>
</div>

<script>
    // 1. INICIALIZACIONES (Reemplaza con tus llaves reales)
    const SURL = "https://tzseklsayxaldtqatwuq.supabase.co"; 
    const SKEY = "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5";
    const supabase = window.supabase.createClient(SURL, SKEY);
    
    (function(){ emailjs.init("TU_USER_ID_DE_EMAILJS"); })(); // <--- Configurar aquí

    let carrito = [], cajaId = "", tiempo = 18000, currentUser = "";

    async function login() {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;
        cajaId = document.getElementById('select_caja').value;

        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (error) { alert("Error"); return; }
        
        currentUser = email;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('label-caja').innerText = cajaId;
        document.getElementById('cajero-name').innerText = email;
        iniciarContador();
    }

    function iniciarContador() {
        setInterval(() => {
            if (tiempo > 0) {
                tiempo--;
                let h = Math.floor(tiempo / 3600), m = Math.floor((tiempo % 3600) / 60), s = tiempo % 60;
                document.getElementById('timer-h').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }, 1000);
    }

    async function handleVenta(e) {
        if (e.key === 'Enter') {
            const { data } = await supabase.from('productos').select('*').eq('ean', e.target.value).single();
            if (data && data.stock > 0) {
                carrito.push(data);
                renderCarrito();
            }
            e.target.value = "";
        }
    }

    function renderCarrito() {
        let total = 0;
        document.getElementById('list-v').innerHTML = carrito.map((p, i) => {
            total += p.precio1;
            return `<tr><td>${p.nombre}</td><td>1</td><td>$${p.precio1}</td><td><button onclick="carrito.splice(${i},1);renderCarrito()">X</button></td></tr>`;
        }).join('');
        document.getElementById('total-v').innerText = total;
    }

    async function finalizarVenta() {
        if(carrito.length === 0) return;
        const btn = document.getElementById('btn-venta');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        try {
            let detalleTexto = carrito.map(p => `- ${p.nombre}: $${p.precio1}`).join('\n');
            let totalVenta = document.getElementById('total-v').innerText;

            // 1. DESCONTAR STOCK EN SUPABASE
            for (let p of carrito) {
                const { data } = await supabase.from('productos').select('stock').eq('ean', p.ean).single();
                await supabase.from('productos').update({ stock: data.stock - 1 }).eq('ean', p.ean);
            }

            // 2. ENVIAR CORREO MEDIANTE EMAILJS
            await emailjs.send("TU_SERVICE_ID", "TU_TEMPLATE_ID", {
                caja: cajaId,
                vendedor: currentUser,
                total: totalVenta,
                detalle: detalleTexto,
                email_to: "administrador@correo.com" // <--- Cambia esto
            });

            alert("✅ Venta exitosa. Reporte enviado al correo.");
            carrito = [];
            renderCarrito();
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "FINALIZAR Y ENVIAR";
        }
    }

    function showPanel(id, el) {
        document.querySelectorAll('.pos-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
