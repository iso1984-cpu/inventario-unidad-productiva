<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GUERRERO ERP v2.8.0 - Sistema Integrado</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #1a1a1a; --g-gray: #f8f9fa; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--g-dark); }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        #main-app { display: none; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--g-dark); color: white; position: fixed; height: 100vh; z-index: 1000; transition: 0.3s; }
        .nav-link { color: #adb5bd; padding: 12px 25px; cursor: pointer; border-left: 4px solid transparent; text-decoration: none; display: block; font-size: 0.9rem; }
        .nav-link:hover, .nav-link.active { background: #2a2a2a; color: white !important; border-left-color: var(--g-red); }
        main { margin-left: 260px; flex-grow: 1; padding: 25px; width: calc(100% - 260px); }
        .workspace { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); min-height: 80vh; }
        .search-box { position: relative; width: 100%; margin-bottom: 20px; }
        #results { position: absolute; width: 100%; z-index: 2000; background: white; border: 1px solid #ddd; max-height: 250px; overflow-y: auto; border-radius: 0 0 10px 10px; }
        .res-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .item-row { display: grid; grid-template-columns: 3fr 1fr 1fr 1fr 40px; gap: 10px; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .total-box { border-left: 5px solid var(--g-red); background: #fff; padding: 20px; border-radius: 10px; position: sticky; top: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h3 class="fw-bold text-center mb-1">GUERRERO <span class="text-danger">ERP</span></h3>
        <p class="text-center text-muted small mb-4 font-monospace">v2.8.0 | ACCESO SEGURO</p>
        <select id="select-caja" class="form-select mb-4 fw-bold">
            <option>Caja 1 - Mañana</option><option>Caja 1 - Tarde</option>
        </select>
        <input type="text" id="user-email" class="form-control mb-2" placeholder="Usuario">
        <input type="password" id="user-pass" class="form-control mb-4" placeholder="Contraseña">
        <button class="btn btn-danger w-100 fw-bold py-3 shadow" onclick="login()">INGRESAR</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <div class="p-4 border-bottom border-secondary mb-3">
            <h5 class="fw-bold text-white mb-0">GUERRERO ERP</h5>
            <small id="info-usuario" class="text-secondary">Cajero: ---</small>
        </div>
        <div class="nav flex-column">
            <div class="nav-link active" onclick="cambiarModulo('SALIDA', this)">📦 Remisión de Salida</div>
            <div class="nav-link" onclick="cambiarModulo('ENTRADA', this)">📥 Remisión de Entrada</div>
            <div class="nav-link" onclick="cambiarModulo('CLIENTES', this)">👤 Clientes</div>
            <div class="nav-link" onclick="cambiarModulo('CAJA', this)">💵 Caja Diaria</div>
            <div class="nav-link text-info mt-4" onclick="enviarCierreCorreo()">📧 Enviar Cierre Gmail</div>
            <div class="nav-link text-warning mt-2" onclick="location.reload()">🔒 Cerrar Sesión</div>
        </div>
    </div>

    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="modulo-title" class="fw-bold mb-0">Remisión de Salida</h2>
            <div id="reloj" class="h4 font-monospace text-danger bg-white px-3 py-2 rounded shadow-sm border">00:00:00</div>
        </div>

        <div id="view-pos" class="row">
            <div class="col-md-9">
                <div class="workspace">
                    <div class="search-box">
                        <input type="text" id="buscador" class="form-control form-control-lg border-danger shadow-sm" 
                               placeholder="🔍 Busque por nombre o código (2+ dígitos)..." 
                               oninput="buscarConDelay(this.value)"
                               onkeypress="if(event.key === 'Enter') { event.preventDefault(); buscar(this.value, true); }">
                        <div id="results" style="display:none;"></div>
                    </div>
                    <div id="lista-remision"></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="total-box shadow-sm border text-center">
                    <label class="text-secondary small fw-bold">TOTAL A COBRAR</label>
                    <h1 class="fw-bold text-danger my-2">$<span id="total-val">0</span></h1>
                    <button class="btn btn-danger btn-lg w-100 py-3 fw-bold mb-2 shadow" onclick="finalizarVenta()">COBRAR (F8)</button>
                    <button class="btn btn-outline-dark w-100 mb-2" onclick="reimprimirUltimo()">🔄 RE-IMPRIMIR</button>
                    <button class="btn btn-outline-secondary w-100" onclick="cart=[];render();">CANCELAR</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const VAULT = { U: "https://tzseklsayxaldtqatwuq.supabase.co", K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5" };
    const headers = { 'apikey': VAULT.K, 'Authorization': `Bearer ${VAULT.K}`, 'Content-Type': 'application/json' };
    let cart = [], modulo = 'SALIDA', cajaActual = '', usuarioActivo = '', searchTimeout = null;

    async function login() {
        const u = document.getElementById('user-email').value.trim();
        const p = document.getElementById('user-pass').value.trim();
        const res = await fetch(`${VAULT.U}/rest/v1/usuarios?usuario=eq.${u}&password=eq.${p}&select=*`, { headers });
        const data = await res.json();
        if (data.length > 0) {
            usuarioActivo = data[0].usuario;
            cajaActual = document.getElementById('select-caja').value;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('info-usuario').innerText = "Cajero: " + usuarioActivo;
        } else alert("Error de acceso");
    }

    function buscarConDelay(v) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => buscar(v), 300);
    }

    async function buscar(v, isExact = false) {
        const resDiv = document.getElementById('results');
        if(v.length < 2) { resDiv.style.display='none'; return; }
        const r = await fetch(`${VAULT.U}/rest/v1/productos?or=(descripcion.ilike.*${v}*,codigo.eq.${v})&limit=10`, { headers });
        const d = await r.json();
        
        if ((isExact || v.length <= 4) && d.length === 1) { 
            add(d[0]); 
            resDiv.style.display = 'none';
            return;
        }

        resDiv.innerHTML = d.map(x => `
            <div class="res-item" onclick='add(${JSON.stringify(x)})'>
                <span><b>${x.descripcion}</b></span>
                <span class="text-danger fw-bold">$${parseInt(x.precio_1 || 0).toLocaleString()}</span>
            </div>`).join('');
        resDiv.style.display = 'block';
    }

    function add(x) {
        const exist = cart.find(i => i.codigo === x.codigo);
        exist ? exist.qty++ : cart.push({...x, qty: 1});
        document.getElementById('buscador').value = '';
        render();
    }

    function render() {
        let t = 0;
        document.getElementById('lista-remision').innerHTML = cart.map((x, i) => {
            const p_unit = parseFloat(x.precio_1) || 0;
            const sub = p_unit * x.qty; t += sub;
            return `<div class="item-row">
                <span class="small fw-bold">${x.descripcion}</span>
                <input type="number" class="form-control" value="${p_unit}" onchange="cart[${i}].precio_1=this.value;render()">
                <input type="number" class="form-control" value="${x.qty}" onchange="cart[${i}].qty=this.value;render()">
                <span class="text-end text-danger fw-bold">$${sub.toLocaleString()}</span>
                <button class="btn text-danger" onclick="cart.splice(${i},1);render()">✕</button>
            </div>`;
        }).join('');
        document.getElementById('total-val').innerText = t.toLocaleString();
    }

    async function finalizarVenta() {
        if(!cart.length) return;
        const total = cart.reduce((acc, i) => acc + (parseFloat(i.precio_1)*i.qty), 0);
        const metodo = confirm("¿Efectivo? (Aceptar=EFECTIVO / Cancelar=TRANSFERENCIA)") ? "EFECTIVO" : "TRANSFERENCIA";

        try {
            const res = await fetch(`${VAULT.U}/rest/v1/rpc/procesar_venta`, {
                method: 'POST', headers,
                body: JSON.stringify({ items: cart, p_terminal: cajaActual, p_usuario: usuarioActivo, p_tipo_movimiento: modulo, p_metodo_pago: metodo })
            });
            if (!res.ok) throw new Error(await res.text());

            localStorage.setItem('ultimo_ticket', JSON.stringify({ items: [...cart], total, metodo, fecha: new Date().toLocaleString() }));
            
            alert("✅ Venta Guardada");
            if(confirm("¿Imprimir Soporte?")) imprimirTicket(JSON.parse(localStorage.getItem('ultimo_ticket')));
            
            cart = []; render();
            document.getElementById('buscador').focus();
        } catch (e) { alert("Error: " + e.message); }
    }

    function reimprimirUltimo() {
        const d = JSON.parse(localStorage.getItem('ultimo_ticket'));
        if(d) imprimirTicket(d); else alert("No hay tickets");
    }

    function imprimirTicket(d) {
        const win = window.open('', '', 'width=300,height=600');
        win.document.write(`<pre style="font-family:monospace;font-size:12px;">
GUERRERO ERP v2.8.0
Fecha: ${d.fecha}
---------------------------
${d.items.map(i => `${i.qty} x ${i.descripcion.substring(0,15)} $${(i.precio_1*i.qty).toLocaleString()}`).join('\n')}
---------------------------
TOTAL: $${d.total.toLocaleString()}
Pago: ${d.metodo}
¡Gracias!</pre>`);
        win.print(); win.close();
    }

    async function enviarCierreCorreo() {
        const hoy = new Date().toISOString().split('T')[0];
        const res = await fetch(`${VAULT.U}/rest/v1/salidas?fecha=gte.${hoy}&select=monto,metodo_pago`, { headers });
        const d = await res.json();
        const total = d.reduce((a, b) => a + b.monto, 0);
        const cuerpo = `CIERRE ${hoy}%0ATotal Ventas: $${total.toLocaleString()}%0AUsuario: ${usuarioActivo}`;
        window.open(`mailto:sarita.6421@://gmail.com Guerrero ERP ${hoy}&body=${cuerpo}`);
    }

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
