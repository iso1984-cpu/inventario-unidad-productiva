<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP - Panel Operativo v15</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <style>
        :root { --g-red: #e31e24; --g-dark: #0f172a; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .sidebar { background: var(--g-dark); color: white; min-height: 100vh; width: 260px; position: fixed; padding: 25px; transition: 0.3s; z-index: 1000; }
        main { margin-left: 260px; padding: 30px; transition: 0.3s; }
        .card-g { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .nav-link { color: #94a3b8; cursor: pointer; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; }
        .nav-link.active { background: var(--g-red); color: white; box-shadow: 0 4px 15px rgba(227, 30, 36, 0.3); }
        .timer-display { background: #1e293b; color: #38bdf8; padding: 10px; border-radius: 12px; font-family: monospace; font-weight: bold; letter-spacing: 2px; }
        .pos-panel { display: none; }
        .pos-panel.active { display: block; }
    </style>
</head>
<body>

<div id="app-engine">
    <!-- BARRA LATERAL (FUNCIONALIDADES SOLICITADAS) -->
    <aside class="sidebar shadow">
        <div class="mb-5 text-center">
            <h4 class="fw-bold text-white m-0">GUERRERO</h4>
            <small class="text-danger fw-bold">SISTEMA 360°</small>
        </div>
        
        <nav class="nav flex-column">
            <div class="nav-link active" onclick="showP('p-ventas', this)"><i class="bi bi-cart3 me-3"></i> Ventas</div>
            <div class="nav-link" onclick="showP('p-inv', this)"><i class="bi bi-box-seam me-3"></i> Inventario</div>
            <div class="nav-link" onclick="showP('p-auditoria', this)"><i class="bi bi-shield-check me-3"></i> Auditoría</div>
        </nav>

        <hr class="text-secondary my-4">

        <div class="text-center">
            <div id="disp-caja" class="badge bg-danger mb-2 p-2 w-100 fs-6">CAJA 1 TARDE</div>
            <div id="reloj-turno" class="timer-display mb-2 fs-5">04:59:53</div>
            <p id="disp-user" class="small fw-bold mt-2 text-light">Cajero: SARITA.6421</p>
        </div>

        <button class="btn btn-outline-warning w-100 mt-4 fw-bold" onclick="cerrarTurno()">CIERRE DE CAJA</button>
        <button class="btn btn-link text-danger w-100 mt-2 small text-decoration-none" onclick="location.reload()">FINALIZAR TURNO</button>
    </aside>

    <!-- ÁREA DE TRABAJO PRINCIPAL -->
    <main>
        <!-- MÓDULO 1: VENTAS (SALIDAS) -->
        <div id="p-ventas" class="pos-panel active">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card-g p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold m-0 text-dark">Remisión de Salida</h5>
                            <input type="text" id="scan-in" class="form-control w-50 border-danger" placeholder="🔍 Escanee código EAN..." onkeypress="handleScan(event)">
                        </div>
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead class="table-light"><tr><th>Producto</th><th>Cant</th><th>V. Unit</th><th>Subtotal</th><th>Acción</th></tr></thead>
                                <tbody id="lista-ventas"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card-g p-4 text-center">
                        <small class="text-muted fw-bold">TOTAL A COBRAR</small>
                        <h1 class="text-success fw-bold display-5 my-3">$<span id="total-val">0</span></h1>
                        <hr>
                        <button class="btn btn-success w-100 py-3 fw-bold shadow-sm" onclick="registrarVenta()">REGISTRAR VENTA</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MÓDULO 2: INVENTARIO MAESTRO -->
        <div id="p-inv" class="pos-panel">
            <div class="card-g p-4">
                <div class="d-flex justify-content-between mb-4">
                    <h5 class="fw-bold text-dark">Stock en Tiempo Real</h5>
                    <button class="btn btn-sm btn-outline-success" onclick="exportarExcel()"><i class="bi bi-file-earmark-excel me-1"></i> Excel</button>
                </div>
                <table class="table table-hover table-sm">
                    <thead class="table-dark"><tr><th>EAN</th><th>Nombre</th><th>Stock</th><th>Precio</th></tr></thead>
                    <tbody id="lista-inv"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    // CREDENCIALES NATIVAS (NO REQUIEREN SDK)
    const VAULT = {
        U: "https://tzseklsayxaldtqatwuq.supabase.co",
        K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    let carrito = [], totalSesion = 0;

    // 1. GESTIÓN DE PANELES
    function showP(id, el) {
        document.querySelectorAll('.pos-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        if(id === 'p-inv') cargarInventario();
    }

    // 2. MOTOR DE ESCÁNER (FETCH NATIVO)
    async function handleScan(e) {
        if (e.key === 'Enter') {
            const ean = e.target.value.trim();
            try {
                const res = await fetch(`${VAULT.U}/rest/v1/productos?ean=eq.${ean}&select=*`, {
                    headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                if (data.length > 0) {
                    carrito.push(data[0]);
                    renderCarrito();
                } else { alert("❌ Producto no registrado."); }
                e.target.value = "";
            } catch (err) { console.error("Error de Red:", err); }
        }
    }

    function renderCarrito() {
        let t = 0;
        document.getElementById('lista-ventas').innerHTML = carrito.map((p, i) => {
            t += p.precio1;
            return `<tr><td>${p.nombre}</td><td>1</td><td>$${p.precio1.toLocaleString()}</td><td>$${p.precio1.toLocaleString()}</td>
                    <td><button class="btn btn-sm btn-outline-danger border-0" onclick="carrito.splice(${i},1);renderCarrito()"><i class="bi bi-trash"></i></button></td></tr>`;
        }).join('');
        document.getElementById('total-val').innerText = t.toLocaleString();
    }

    // 3. REGISTRO Y DESCUENTO DE STOCK (PATCH NATIVO)
    async function registrarVenta() {
        if(carrito.length === 0) return alert("⚠️ Carrito vacío");
        const subtotal = parseInt(document.getElementById('total-val').innerText.replace(/\D/g,''));
        
        try {
            for (let item of carrito) {
                // Descuento Atómico de Stock
                await fetch(`${VAULT.U}/rest/v1/productos?ean=eq.${item.ean}`, {
                    method: 'PATCH',
                    headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock: item.stock - 1 })
                });
            }
            totalSesion += subtotal;
            alert("✅ Venta Registrada con Éxito");
            carrito = []; renderCarrito();
        } catch (e) { alert("Error al procesar stock."); }
    }

    // 4. CARGA DE INVENTARIO
    async function cargarInventario() {
        const res = await fetch(`${VAULT.U}/rest/v1/productos?select=*&order=nombre.asc`, {
            headers: { 'apikey': VAULT.K }
        });
        const data = await res.json();
        document.getElementById('lista-inv').innerHTML = data.map(p => `
            <tr><td>${p.ean}</td><td>${p.nombre}</td>
            <td class="${p.stock < 5 ? 'text-danger fw-bold' : ''}">${p.stock}</td>
            <td>$${p.precio1.toLocaleString()}</td></tr>
        `).join('');
    }

    // 5. CIERRE DE CAJA (AUDITORÍA FINAL)
    function cerrarTurno() {
        if(confirm(`¿Desea realizar el CIERRE DE CAJA?\nTotal recaudado: $${totalSesion.toLocaleString()}`)) {
            alert(`REPORTE GENERADO:\nCaja: 1 Tarde\nCajero: SARITA.6421\nTotal: $${totalSesion.toLocaleString()}\nEl sistema se cerrará.`);
            location.reload();
        }
    }
</script>
</body>
</html>
