<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUERRERO ERP - Auditoría de Seguridad</title>
    <!-- Solo CSS nativo para el diseño -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #0f172a; }
        body { background: #f1f5f9; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; font-family: 'Inter', system-ui, sans-serif; }
        .secure-card { background: white; padding: 40px; border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 440px; border: 1px solid #e2e8f0; }
        .audit-console { background: #1e293b; color: #38bdf8; font-family: 'SF Mono', monospace; font-size: 0.75rem; padding: 15px; border-radius: 12px; height: 100px; overflow-y: auto; margin-bottom: 25px; border: 1px solid #334155; }
        .form-control:focus { border-color: var(--g-red); box-shadow: 0 0 0 4px rgba(227, 30, 36, 0.1); }
        #app-pos { display: none; }
    </style>
</head>
<body>

<div id="auth-gate" class="secure-card text-center">
    <h3 class="fw-bold text-danger mb-1">GUERRERO ERP</h3>
    <p class="text-muted small text-uppercase fw-bold mb-4" style="letter-spacing: 1px;">Security Layer v15.0</p>
    
    <!-- Monitor de Auditoría de Red (Handshake) -->
    <div id="audit-log" class="audit-console text-start">
        > [INIT] Túnel de seguridad activo...<br>
        > [NET] Esperando credenciales nativas...
    </div>

    <div id="auth-fields">
        <select id="sel-caja" class="form-select mb-3 py-2">
            <optgroup label="Caja 1"><option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option><option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option></optgroup>
            <optgroup label="Caja 2"><option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option><option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option></optgroup>
            <optgroup label="Caja 3"><option value="Caja 3 Mañana">☀️ Caja 3 - Mañana</option><option value="Caja 3 Tarde">🌙 Caja 3 - Tarde</option></optgroup>
            <optgroup label="Caja 4"><option value="Caja 4 Mañana">☀️ Caja 4 - Mañana</option><option value="Caja 4 Tarde">🌙 Caja 4 - Tarde</option></optgroup>
        </select>
        <input type="email" id="u-mail" class="form-control mb-2" placeholder="usuario@seguro.com">
        <input type="password" id="u-pass" class="form-control mb-4" placeholder="Contraseña">
        <button id="btn-gate" class="btn btn-danger w-100 py-3 fw-bold shadow" onclick="SecurityEngine.authorize()">AUTENTICAR TURNO 5H</button>
    </div>
</div>

<script>
/**
 * SECURITY ENGINE - ARQUITECTURA ZERO-SDK
 */
const SecurityEngine = (() => {
    // Endpoints Directos de Ingeniería
    const VAULT = {
        U: "https://tzseklsayxaldtqatwuq.supabase.co",
        K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    const log = (msg) => {
        const audit = document.getElementById('audit-log');
        audit.innerHTML += `> ${msg}<br>`;
        audit.scrollTop = audit.scrollHeight;
    };

    const authorize = async () => {
        const email = document.getElementById('u-mail').value;
        const pass = document.getElementById('u-pass').value;
        const caja = document.getElementById('sel-caja').value;
        const btn = document.getElementById('btn-gate');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> VALIDANDO...';
        log(`[AUTH] Solicitando token de acceso para ${email}...`);

        try {
            // PETICIÓN NATIVA: Salta bloqueos de red al no usar scripts externos
            const res = await fetch(`${VAULT.U}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: pass })
            });

            const data = await res.json();

            if (res.ok) {
                log(`[SUCCESS] Sesión autorizada. Registrando auditoría...`);
                
                // Registro de Auditoría de Ciberseguridad
                await fetch(`${VAULT.U}/rest/v1/auditoria_logins`, {
                    method: 'POST',
                    headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify({
                        cajero: email,
                        caja: caja,
                        evento: "LOGIN_SUCCESS",
                        timestamp: new Date().toISOString()
                    })
                });

                document.getElementById('auth-gate').innerHTML = "<h4 class='text-center p-4 fw-bold'>DESBLOQUEANDO ENTORNO...</h4>";
                setTimeout(() => { alert("Bienvenido al Núcleo de Guerrero ERP"); }, 500);
            } else {
                log(`[REJECT] Acceso Denegado.`);
                alert("ERROR DE SEGURIDAD: Credenciales inválidas o red bloqueada.");
                btn.disabled = false;
                btn.innerText = "AUTENTICAR TURNO 5H";
            }
        } catch (e) {
            log(`[FATAL] Error de túnel: Handshake fallido.`);
            alert("ALERTA DE RED: Su conexión TLS está siendo bloqueada por el operador.");
            btn.disabled = false;
        }
    };

    return { authorize };
})();
</script>
</body>
</html>
