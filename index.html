<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP - Seguridad de Grado Militar</title>
    <!-- CSS Nativo para evitar bloqueos de scripts -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #0f172a; }
        body { background: #f8fafc; font-family: 'Inter', system-ui, sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
        .secure-card { background: #fff; padding: 45px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); width: 100%; max-width: 440px; border: 1px solid #e2e8f0; }
        .status-monitor { font-family: 'SF Mono', monospace; font-size: 11px; background: #1e293b; color: #38bdf8; padding: 12px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .form-control:focus { border-color: var(--g-red); box-shadow: 0 0 0 3px rgba(227, 30, 36, 0.1); }
        #secure-app { display: none; }
    </style>
</head>
<body>

<div id="auth-gate" class="secure-card">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-danger m-0">GUERRERO ERP</h3>
        <small class="text-muted text-uppercase fw-semibold" style="letter-spacing: 1px;">Security Layer v15.0</small>
    </div>

    <!-- Monitor de Auditoría de Red -->
    <div id="network-audit" class="status-monitor">
        [INIT] Sincronizando túnel de seguridad...
    </div>

    <div id="login-fields">
        <select id="access_point" class="form-select mb-3">
            <optgroup label="Caja 1"><option value="C1_M">☀️ Caja 1 - Mañana</option><option value="C1_T">🌙 Caja 1 - Tarde</option></optgroup>
            <optgroup label="Caja 2"><option value="C2_M">☀️ Caja 2 - Mañana</option><option value="C2_T">🌙 Caja 2 - Tarde</option></optgroup>
            <optgroup label="Caja 3"><option value="C3_M">☀️ Caja 3 - Mañana</option><option value="C3_T">🌙 Caja 3 - Tarde</option></optgroup>
            <optgroup label="Caja 4"><option value="C4_M">☀️ Caja 4 - Mañana</option><option value="C4_T">🌙 Caja 4 - Tarde</option></optgroup>
        </select>
        <input type="email" id="auth_user" class="form-control mb-2" placeholder="usuario@seguro.com" autocomplete="off">
        <input type="password" id="auth_key" class="form-control mb-4" placeholder="••••••••" autocomplete="off">
        <button id="btn-gate" class="btn btn-danger w-100 py-3 fw-bold" onclick="SecurityCore.authorize()">AUTENTICAR TURNO 5H</button>
    </div>
</div>

<script>
/**
 * SECURITY CORE - INGENIERÍA EN CIBERSEGURIDAD
 */
const SecurityCore = (() => {
    // Endpoints Directos (Evitan el bloqueo del SDK)
    const VAULT = {
        U: "https://tzseklsayxaldtqatwuq.supabase.co",
        K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    const audit = (msg) => {
        const mon = document.getElementById('network-audit');
        mon.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    };

    const authorize = async () => {
        const user = document.getElementById('auth_user').value;
        const pass = document.getElementById('auth_key').value;
        const caja = document.getElementById('access_point').value;
        const btn = document.getElementById('btn-gate');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> VALIDANDO...';
        audit("Iniciando Handshake con el servidor...");

        try {
            // Capa de Red Nativa (Sin dependencias externas)
            const res = await fetch(`${VAULT.U}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: user, password: pass })
            });

            const data = await res.json();

            if (res.ok) {
                audit("✅ Autorización Exitosa. Generando Logs...");
                
                // Auditoría de Seguridad Silenciosa
                await fetch(`${VAULT.U}/rest/v1/auditoria_logins`, {
                    method: 'POST',
                    headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify({
                        cajero: user,
                        caja: caja,
                        evento: "AUTH_SUCCESS",
                        timestamp: new Date().toISOString()
                    })
                });

                document.getElementById('auth_gate').innerHTML = "<h4 class='text-center p-4'>DESBLOQUEANDO ENTORNO...</h4>";
                setTimeout(() => { alert("Bienvenido al Núcleo de Guerrero ERP"); }, 500);
            } else {
                audit("❌ Rechazo de Credenciales.");
                alert("ERROR DE SEGURIDAD: " + (data.error_description || "Acceso Denegado"));
                btn.disabled = false;
                btn.innerText = "AUTENTICAR TURNO 5H";
            }
        } catch (e) {
            audit("⚠️ Bloqueo de Red detectado en el túnel.");
            alert("ALERTA DE CIBERSEGURIDAD: Su red bloquea la conexión TLS. Intente usar datos móviles o VPN.");
            btn.disabled = false;
        }
    };

    return { authorize };
})();
</script>
</body>
</html>
