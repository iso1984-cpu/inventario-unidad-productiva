<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUERRERO ERP - Auditoría de Núcleo</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #1a1a1a; }
        body { background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; }
        .secure-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 440px; text-align: center; }
        .audit-terminal { background: #000; color: #00ff00; font-family: monospace; font-size: 0.7rem; padding: 12px; border-radius: 12px; height: 90px; overflow-y: auto; text-align: left; margin-bottom: 20px; border: 1px solid #333; }
        #app-main { display: none; width: 100%; max-width: 500px; text-align: center; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .timer-h { font-size: 3rem; font-weight: bold; font-family: 'Courier New', Courier, monospace; color: var(--g-dark); letter-spacing: 2px; }
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO BLINDADO -->
<div id="login-gate" class="secure-card">
    <h3 class="fw-bold text-danger mb-4">GUERRERO ERP</h3>
    
    <div id="audit-log" class="audit-terminal">
        > [INIT] Túnel de seguridad activo...<br>
        > [NET] Esperando credenciales nativas...
    </div>

    <select id="select_caja" class="form-select mb-3 py-2">
        <optgroup label="Caja 1"><option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option><option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option></optgroup>
        <optgroup label="Caja 2"><option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option><option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option></optgroup>
        <optgroup label="Caja 3"><option value="Caja 3 Mañana">☀️ Caja 3 - Mañana</option><option value="Caja 3 Tarde">🌙 Caja 3 - Tarde</option></optgroup>
        <optgroup label="Caja 4"><option value="Caja 4 Mañana">☀️ Caja 4 - Mañana</option><option value="Caja 4 Tarde">🌙 Caja 4 - Tarde</option></optgroup>
    </select>

    <input type="email" id="auth_user" class="form-control mb-2 py-2" placeholder="usuario@correo.com">
    <input type="password" id="auth_pass" class="form-control mb-4 py-2" placeholder="Contraseña">
    
    <button id="btn-gate" class="btn btn-danger w-100 py-3 fw-bold shadow" onclick="GuerreroEngine.authorize()">AUTENTICAR TURNO 5H</button>
</div>

<!-- PANEL TRAS INGRESO EXITOSO -->
<div id="app-main">
    <div class="badge bg-danger px-3 py-2 mb-3 fs-6" id="caja-display">---</div>
    <h5 class="text-muted">TURNO ACTIVO (5 HORAS)</h5>
    <div id="reloj" class="timer-h my-4">05:00:00</div>
    <p id="user-display" class="fw-bold text-secondary">Cajero: ---</p>
    <hr>
    <div class="alert alert-success py-2 small">🛡️ Conexión Nativa Cifrada Establecida</div>
    <button class="btn btn-outline-danger w-100 mt-4" onclick="location.reload()">FINALIZAR TURNO</button>
</div>

<script>
/**
 * GUERRERO ENGINE - CIBERSEGURIDAD V15
 */
const GuerreroEngine = (() => {
    const VAULT = {
        U: "https://tzseklsayxaldtqatwuq.supabase.co",
        K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    let sRestantes = 18000; // 5 Horas

    const log = (m) => { document.getElementById('audit-log').innerHTML += `> ${m}<br>`; };

    const authorize = async () => {
        const user = document.getElementById('auth_user').value;
        const pass = document.getElementById('auth_pass').value;
        const caja = document.getElementById('select_caja').value;
        const btn = document.getElementById('btn-gate');

        btn.disabled = true;
        btn.innerText = "VALIDANDO...";
        log(`[AUTH] Solicitando acceso para ${user}...`);

        try {
            // PETICIÓN NATIVA: Salta el bloqueo del operador al no usar SDK externo
            const res = await fetch(`${VAULT.U}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: user, password: pass })
            });

            const data = await res.json();

            if (res.ok) {
                log(`[SUCCESS] Sesión auditada correctamente.`);
                
                // Registro de Auditoría Silencioso
                fetch(`${VAULT.U}/rest/v1/auditoria_logins`, {
                    method: 'POST',
                    headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cajero: user, caja: caja, fecha: new Date().toISOString() })
                });

                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
                document.getElementById('caja-display').innerText = caja;
                document.getElementById('user-display').innerText = "Cajero: " + user.split('@')[0].toUpperCase();
                
                iniciarConteo();
            } else {
                log(`[REJECT] Credenciales inválidas.`);
                alert("Acceso Denegado: Verifique sus datos.");
                btn.disabled = false;
                btn.innerText = "AUTENTICAR TURNO 5H";
            }
        } catch (e) {
            log(`[FATAL] Error de túnel: Red Bloqueada.`);
            alert("Error Crítico de Red. Intente con otra conexión.");
            btn.disabled = false;
        }
    };

    const iniciarConteo = () => {
        const r = document.getElementById('reloj');
        setInterval(() => {
            if (sRestantes > 0) {
                sRestantes--;
                let h = Math.floor(sRestantes / 3600), m = Math.floor((sRestantes % 3600) / 60), s = sRestantes % 60;
                r.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            } else { location.reload(); }
        }, 1000);
    };

    return { authorize };
})();
</script>
</body>
</html>
