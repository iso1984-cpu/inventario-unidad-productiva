<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GUERRERO ERP v2.8.3 - Master Stock & Gmail</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --g-red: #e31e24; --g-dark: #1a1a1a; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--g-dark); }
        .login-card { background: white; padding: 35px; border-radius: 20px; width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        #main-app { display: none; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--g-dark); color: white; position: fixed; height: 100vh; z-index: 1000; }
        .nav-link { color: #adb5bd; padding: 12px 25px; cursor: pointer; text-decoration: none; display: block; border-left: 4px solid transparent; font-size: 0.9rem; }
        .nav-link.active { background: #2a2a2a; color: white !important; border-left-color: var(--g-red); }
        main { margin-left: 260px; flex-grow: 1; padding: 20px; width: calc(100% - 260px); }
        .tabs-bar { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .tab-item { background: #dee2e6; padding: 10px 18px; border-radius: 12px 12px 0 0; cursor: pointer; font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; min-width: 130px; }
        .tab-item.active { background: white; border-top: 4px solid var(--g-red); color: var(--g-red); }
        .workspace { background: white; border-radius: 0 15px 15px 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); min-height: 70vh; }
        .item-row { display: grid; grid-template-columns: 1fr 3fr 1.2fr 1.2fr 1.2fr 40px; gap: 10px; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        #results { position: absolute; width: 100%; z-index: 2000; background: white; border: 1px solid #ddd; max-height: 250px; overflow-y: auto; border-radius: 0 0 15px 15px; }
        .total-box { border-left: 5px solid var(--g-red); background: #fff; padding: 25px; border-radius: 15px; position: sticky; top: 10px; border: 1px solid #eee; }
        .stock-critico { background: #fff3f3; color: #dc3545; font-weight: bold; padding: 2px 5px; border-radius: 5px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card text-center">
        <h3 class="fw-bold mb-1">GUERRERO <span class="text-danger">ERP</span></h3>
        <p class="text-muted small mb-4 font-monospace">v2.8.3 | STOCK ALERTS</p>
        <select id="select-caja" class="form-select mb-3 fw-bold">
            <option>Caja 1 - Mañana</option><option>Caja 1 - Tarde</option>
            <option>Caja 2 - Mañana</option><option>Caja 2 - Tarde</option>
            <option>Caja 3 - Mañana</option><option>Caja 3 - Tarde</option>
            <option>Caja 4 - Mañana</option><option>Caja 4 - Tarde</option>
        </select>
        <input type="text" id="u" class="form-control mb-2" placeholder="Usuario">
        <input type="password" id="p" class="form-control mb-4" placeholder="Contraseña">
        <button class="btn btn-danger w-100 fw-bold py-3 shadow" onclick="login()">INGRESAR AL SISTEMA</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <div class="p-4 border-bottom border-secondary mb-3 text-white text-center"><h5 class="fw-bold">GUERRERO ERP</h5><small id="info-u">---</small></div>
        <div class="nav flex-column">
            <div class="nav-link active" onclick="setVista('POS')">📦 Ventas / Compras</div>
            <div class="nav-link" onclick="setVista('CAJA')">💵 Movimientos de Caja</div>
            <div class="nav-link" onclick="setVista('CLIENTES')">👤 Clientes</div>
            <div class="nav-link text-info mt-4 fw-bold" onclick="enviarCierreGmail()">📧 CIERRE Y ALERTAS GMAIL</div>
            <div class="nav-link text-warning mt-2" onclick="location.reload()">🔒 Cerrar Sesión</div>
        </div>
    </div>

    <main>
        <div id="view-pos">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div id="tabs-header" class="tabs-bar flex-grow-1"></div>
                <div class="ms-3"><button class="btn btn-sm btn-danger fw-bold" onclick="nuevaRemision('SALIDA')">+ VENTA</button></div>
                <div class="ms-2"><button class="btn btn-sm btn-dark fw-bold" onclick="nuevaRemision('ENTRADA')">+ COMPRA</button></div>
            </div>
            
            <div class="row">
                <div class="col-md-9">
                    <div class="workspace">
                        <div class="position-relative mb-3">
                            <input type="text" id="buscador" class="form-control form-control-lg border-danger" 
                                   placeholder="🔍 Código o Producto..." oninput="buscar(this.value)">
                            <div id="results" style="display:none;" class="shadow-lg"></div>
                        </div>
                        <div id="lista-items"></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="total-box text-center shadow-sm">
                        <label class="small fw-bold text-secondary text-uppercase">Total Redondeado</label>
                        <h1 class="fw-bold text-danger my-3">$<span id="total-val">0</span></h1>
                        <button class="btn btn-danger btn-lg w-100 py-3 fw-bold mb-2 shadow" onclick="finalizar()">COBRAR (F8)</button>
                        <button class="btn btn-outline-dark w-100" onclick="reimprimir()">🔄 RE-IMPRIMIR</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-caja" style="display:none;" class="workspace">
            <h4 class="fw-bold mb-4">Control de Caja</h4>
            <div class="row g-4 text-center">
                <div class="col-md-6"><div class="card p-4 border-success"><h5>📥 Base del Día</h5><input type="number" id="m-ing" class="form-control mb-3"><button class="btn btn-success w-100 fw-bold" onclick="movCaja('INGRESO')">Registrar</button></div></div>
                <div class="col-md-6"><div class="card p-4 border-danger"><h5>📤 Gastos / Egresos</h5><input type="number" id="m-egr" class="form-control mb-3"><button class="btn btn-danger w-100 fw-bold" onclick="movCaja('EGRESO')">Registrar</button></div></div>
            </div>
        </div>

        <div id="view-clientes" style="display:none;" class="workspace">
            <div class="d-flex justify-content-between mb-4"><h4>Clientes</h4><button class="btn btn-danger" onclick="nuevoCliente()">+ Nuevo</button></div>
            <table class="table table-hover"><thead class="table-dark"><tr><th>Doc</th><th>Nombre</th><th>Tel</th><th>Acción</th></tr></thead><tbody id="lista-cli-tabla"></tbody></table>
        </div>
    </main>
</div>

<script>
    const VAULT = { U: "https://tzseklsayxaldtqatwuq.supabase.co", K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5" };
    const headers = { 'apikey': VAULT.K, 'Authorization': `Bearer ${VAULT.K}`, 'Content-Type': 'application/json' };
    let docs = [], activeId = 0, uActivo = '', caja = '';

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const res = await fetch(`${VAULT.U}/rest/v1/usuarios?usuario=eq.${u}&password=eq.${p}&select=*`, { headers });
        const d = await res.json();
        if(d.length > 0) {
            uActivo = d[0].usuario; caja = document.getElementById('select-caja').value;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('info-u').innerText = "Cajero: " + uActivo;
            nuevaRemision('SALIDA');
        } else alert("Error de acceso");
    }

    function nuevaRemision(tipo) {
        const id = Date.now();
        docs.push({ id, tipo, cart: [] });
        activarTab(id);
    }

    function activarTab(id) {
        activeId = id;
        renderTabs();
        renderCart();
    }

    function renderTabs() {
        document.getElementById('tabs-header').innerHTML = docs.map(d => `
            <div class="tab-item ${d.id === activeId ? 'active' : ''}" onclick="activarTab(${d.id})">
                ${d.tipo === 'SALIDA' ? '📦 Venta' : '📥 Compra'} <span onclick="cerrarTab(${d.id}, event)">×</span>
            </div>`).join('');
    }

    function cerrarTab(id, e) {
        e.stopPropagation();
        docs = docs.filter(d => d.id !== id);
        if(docs.length === 0) nuevaRemision('SALIDA');
        else activarTab(docs[docs.length - 1].id);
    }

    async function buscar(v) {
        if(v.length < 1) { document.getElementById('results').style.display='none'; return; }
        const r = await fetch(`${VAULT.U}/rest/v1/productos?or=(descripcion.ilike.*${v}*,codigo.eq.${v})&limit=8`, { headers });
        const d = await r.json();
        
        if(d.length === 1 && d[0].codigo == v) { 
            add(d[0]); document.getElementById('buscador').value = '';
            document.getElementById('results').style.display = 'none';
            return;
        }

        const resDiv = document.getElementById('results');
        resDiv.innerHTML = d.map(x => `
            <div class="res-item" onclick='add(${JSON.stringify(x)})'>
                <span>${x.descripcion} ${x.stock < 3 ? '<span class="stock-critico">Stock Bajo: '+x.stock+'</span>' : ''}</span>
                <b>$${parseInt(x.precio_1).toLocaleString()}</b>
            </div>`).join('');
        resDiv.style.display = d.length > 0 ? 'block' : 'none';
    }

    function add(x) {
        const doc = docs.find(d => d.id === activeId);
        const ex = doc.cart.find(i => i.codigo === x.codigo);
        ex ? ex.qty++ : doc.cart.push({...x, qty: 1});
        document.getElementById('results').style.display='none';
        document.getElementById('buscador').value = '';
        renderCart();
    }

    function renderCart() {
        const doc = docs.find(d => d.id === activeId);
        let t = 0;
        document.getElementById('lista-items').innerHTML = doc.cart.map((x, i) => {
            const sub = Math.round(x.precio_1 * x.qty); t += sub;
            return `<div class="item-row">
                <span>${x.codigo}</span><span class="fw-bold">${x.descripcion}</span>
                <input type="number" class="form-control form-control-sm" value="${x.precio_1}" onchange="actualizarItem(${i}, 'precio_1', this.value)">
                <input type="number" class="form-control form-control-sm" step="0.001" value="${x.qty}" onchange="actualizarItem(${i}, 'qty', this.value)">
                <span class="fw-bold text-end">$${sub.toLocaleString()}</span>
                <button class="btn btn-sm text-danger" onclick="docs.find(d=>d.id==${activeId}).cart.splice(${i},1);renderCart()">✕</button>
            </div>`;
        }).join('');
        document.getElementById('total-val').innerText = Math.round(t).toLocaleString();
    }

    function actualizarItem(idx, campo, val) {
        docs.find(d => d.id === activeId).cart[idx][campo] = parseFloat(val);
        renderCart();
    }

    async function finalizar() {
        const doc = docs.find(d => d.id === activeId);
        if(!doc.cart.length) return;
        const mp = prompt("MÉTODO DE PAGO:\n1. Efectivo\n2. Nequi\n3. Daviplata\n4. Transfiya", "1");
        const met = {"1":"EFECTIVO", "2":"NEQUI", "3":"DAVIPLATA", "4":"TRANSFIYA"}[mp] || "EFECTIVO";

        const res = await fetch(`${VAULT.U}/rest/v1/rpc/${doc.tipo === 'SALIDA' ? 'guardar_remision_venta' : 'guardar_remision_compra'}`, {
            method: 'POST', headers,
            body: JSON.stringify({ items: doc.cart, p_terminal: caja, p_usuario: uActivo, p_tipo_movimiento: doc.tipo, p_metodo_pago: met })
        });
        
        if(res.ok) {
            const num = await res.json();
            alert(`✅ ${doc.tipo} #${num} EXITOSA`);
            localStorage.setItem('ultimo', JSON.stringify({...doc, num, met, fecha: new Date().toLocaleString()}));
            cerrarTab(activeId, {stopPropagation:()=>{}});
        }
    }

    async function enviarCierreGmail() {
        const hoy = new Date().toISOString().split('T')[0];
        
        // 1. Obtener Ventas de hoy discriminadas
        const rV = await fetch(`${VAULT.U}/rest/v1/remision_de_venta?fecha=gte.${hoy}&select=monto,metodo_pago`, { headers });
        const ventas = await rV.json();
        
        const efec = ventas.filter(v => v.metodo_pago === 'EFECTIVO').reduce((a, b) => a + b.monto, 0);
        const trans = ventas.filter(v => v.metodo_pago !== 'EFECTIVO').reduce((a, b) => a + b.monto, 0);

        // 2. Obtener Alertas de Inventario Crítico (< 3 unidades)
        const rS = await fetch(`${VAULT.U}/rest/v1/productos?stock=lt.3&select=descripcion,stock`, { headers });
        const alertas = await rS.json();

        let msj = `REPORTE DE CIERRE - GUERRERO ERP (${hoy})%0A%0A`;
        msj += `💰 VENTAS EN EFECTIVO: $${efec.toLocaleString()}%0A`;
        msj += `📱 VENTAS TRANSFERENCIAS: $${trans.toLocaleString()}%0A`;
        msj += `💎 TOTAL RECAUDADO: $${(efec + trans).toLocaleString()}%0A%0A`;
        msj += `⚠️ ALERTAS DE INVENTARIO CRÍTICO (COMPRAR URGENTE):%0A`;
        
        if(alertas.length > 0) {
            alertas.forEach(a => msj += `- ${a.descripcion}: Quedan ${a.stock} un.%0A`);
        } else { msj += `Inventario al día. No hay faltantes.%0A`; }

        window.open(`mailto:sarita.6421@://gmail.com Y ALERTAS ${hoy}&body=${msj}`);
    }

    function setVista(v) {
        document.getElementById('view-pos').style.display = v === 'POS' ? 'flex' : 'none';
        document.getElementById('view-caja').style.display = v === 'CAJA' ? 'block' : 'none';
        document.getElementById('view-clientes').style.display = v === 'CLIENTES' ? 'block' : 'none';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    }

    async function movCaja(t) {
        const m = document.getElementById(t === 'INGRESO' ? 'm-ing' : 'm-egr').value;
        const c = prompt("Concepto:");
        if(!m || !c) return;
        await fetch(`${VAULT.U}/rest/v1/movimientos_caja`, { method:'POST', headers, body: JSON.stringify({tipo:t, monto:m, concepto:c, usuario:uActivo, terminal:caja})});
        alert("Guardado");
    }
</script>
</body>
</html>
