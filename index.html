<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUERRERO ERP v15</title>

    <!-- CONFIGURACIÓN PWA -->
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIkd1ZXJyZXJvIEVSUCB2MTUiLAogICJzaG9ydF9uYW1lIjogIkd1ZXJyZXJvIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMyYzNlNTAiLAogICJ0aGVtZV9jb2xvciI6ICIjZTMxZTI0IiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMzE0NS8zMTQ1ODI3LnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">
    <meta name="theme-color" content="#e31e24">

    <!-- LIBRERÍAS DE INTERFAZ -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
        :root { --g-red: #e31e24; --g-dark: #2c3e50; }
        body { background: #f1f3f5; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 15px; }
        .login-card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; }
        .progress { height: 10px; border-radius: 20px; margin-bottom: 20px; }
        .progress-bar { background-color: var(--g-red); transition: width 0.5s ease; }
        .audit-console { font-family: 'Courier New', monospace; font-size: 0.7rem; background: #000; color: #00ff00; padding: 12px; border-radius: 12px; height: 100px; overflow-y: auto; text-align: left; margin-bottom: 20px; border: 1px solid #333; }
        .btn-install { background: #ffc107; color: #000; border: none; font-weight: bold; border-radius: 10px; padding: 10px; display: none; }
        #form-ui { opacity: 0.4; pointer-events: none; transition: 0.5s; }
    </style>
</head>
<body>

<div id="login-screen" class="login-card">
    <button id="pwa-btn" class="btn btn-install w-100 mb-3">📲 INSTALAR APP GUERRERO</button>
    
    <h3 class="fw-bold text-danger mb-4">GUERRERO ERP</h3>
    
    <!-- BARRA DE PROGRESO DE INGENIERÍA -->
    <div class="d-flex justify-content-between small text-muted mb-1">
        <span id="st-txt">Sincronizando...</span>
        <span id="st-perc">0%</span>
    </div>
    <div class="progress">
        <div id="pb" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
    </div>

    <!-- AUDITORÍA DE NÚCLEO -->
    <div id="audit" class="audit-console">> Iniciando secuencia PWA...</div>

    <div id="form-ui">
        <select id="sel_caja" class="form-select mb-3">
            <optgroup label="Caja 1"><option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option><option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option></optgroup>
            <optgroup label="Caja 2"><option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option><option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option></optgroup>
        </select>
        <input type="email" id="u_mail" class="form-control mb-2" placeholder="usuario@correo.com">
        <input type="password" id="u_pass" class="form-control mb-4" placeholder="••••••••">
        <button id="btn-in" class="btn btn-danger w-100 py-3 fw-bold shadow" onclick="GCore.login()" disabled>CONECTANDO...</button>
    </div>
</div>

<script>
/**
 * GUERRERO CORE V15 - ESTRATEGIA PWA BLINDADA
 */
const GCore = (() => {
    const CFG = {
        U: "https://tzseklsayxaldtqatwuq.supabase.co",
        K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    let client = null, deferredPrompt;

    const log = (m) => { document.getElementById('audit').innerHTML += `> ${m}<br>`; document.getElementById('audit').scrollTop = 9999; };
    const upd = (p, t) => { document.getElementById('pb').style.width = p+'%'; document.getElementById('st-perc').innerText = p+'%'; document.getElementById('st-txt').innerText = t; };

    // REGISTRO DE INSTALACIÓN (PWA)
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('pwa-btn').style.display = 'block';
    });

    document.getElementById('pwa-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('pwa-btn').style.display = 'none';
        }
    });

    const init = async () => {
        log("Analizando entorno móvil...");
        upd(30, "Buscando Núcleo...");
        
        // Espera de seguridad para el SDK
        let attempts = 0;
        while (!window.supabase && attempts < 10) {
            await new Promise(r => setTimeout(r, 500));
            attempts++;
        }

        if (window.supabase) {
            upd(70, "Cargando Cliente...");
            client = window.supabase.createClient(CFG.U, CFG.K);
            log("Núcleo Supabase Sincronizado.");
            upd(100, "Sistema Listo");
            document.getElementById('form-ui').style.opacity = "1";
            document.getElementById('form-ui').style.pointerEvents = "auto";
            document.getElementById('btn-in').disabled = false;
            document.getElementById('btn-in').innerText = "INICIAR TURNO 5H";
        } else {
            upd(0, "Error de SDK");
            log("CRÍTICO: Fallo al inyectar núcleo.");
        }
    };

    const login = async () => {
        const email = document.getElementById('u_mail').value;
        const pass = document.getElementById('u_pass').value;
        const caja = document.getElementById('sel_caja').value;
        
        document.getElementById('btn-in').disabled = true;
        document.getElementById('btn-in').innerText = "AUDITANDO...";
        log(`Validando credenciales: ${email}`);

        const { data, error } = await client.auth.signInWithPassword({ email, password: pass });

        if (error) {
            log(`Acceso denegado: ${error.message}`);
            alert(error.message);
            document.getElementById('btn-in').disabled = false;
            document.getElementById('btn-in').innerText = "REINTENTAR";
        } else {
            log("Acceso concedido. Registrando auditoría...");
            // Auditoría de ingreso
            await client.from('auditoria_logins').insert([{ cajero: email, caja: caja, fecha: new Date().toISOString() }]);
            log("Redirigiendo al panel...");
            setTimeout(() => { alert("Bienvenido al Núcleo Guerrero"); }, 500);
        }
    };

    window.onload = init;
    return { login };
})();
</script>
</body>
</html>
