<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP - Panel Maestro</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    
    <style>
        :root { --g-red: #e31e24; --g-dark: #0f172a; --g-emerald: #00a650; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .sidebar { background: var(--g-dark); color: white; min-height: 100vh; width: 260px; position: fixed; padding: 25px; z-index: 1000; }
        main { margin-left: 260px; padding: 30px; }
        .nav-link { color: #94a3b8; cursor: pointer; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; text-decoration: none; }
        .nav-link.active { background: var(--g-red); color: white; box-shadow: 0 4px 15px rgba(227, 30, 36, 0.3); }
        .card-g { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 25px; border: none; }
        .timer-h { background: #1e293b; color: #38bdf8; padding: 12px; border-radius: 12px; font-family: monospace; font-weight: bold; font-size: 1.8rem; text-align: center; }
        .pos-panel { display: none; }
        .pos-panel.active { display: block; }
    </style>
</head>
<body>

<div id="wrapper">
    <!-- BARRA LATERAL CON TUS PESTAÑAS -->
    <aside class="sidebar shadow">
        <div class="mb-5 text-center text-white">
            <h4 class="fw-bold m-0">GUERRERO</h4>
            <small class="text-danger fw-bold">NÚCLEO ERP</small>
        </div>
        
        <button class="btn btn-success w-100 mb-4 py-3 fw-bold shadow-sm" style="background-color: var(--g-emerald); border:none;" onclick="showP('p-ventas', this)">
            <i class="bi bi-cart-plus-fill me-2"></i> REMISIONAR
        </button>

        <nav class="nav flex-column">
            <div class="nav-link active" onclick="showP('p-ventas', this)"><i class="bi bi-cart3 me-3"></i> Ventas (Salidas)</div>
            <div class="nav-link" onclick="showP('p-inv', this)"><i class="bi bi-box-seam me-3"></i> Inventario (Productos)</div>
        </nav>

        <hr class="text-secondary my-5">

        <div class="text-center">
            <div class="badge bg-danger mb-3 p-2 w-100 fs-6">CAJA 1 MAÑANA</div>
            <div id="reloj-global" class="timer-h">04:59:59</div>
            <p class="small fw-bold mt-3 text-light opacity-75">Cajero: SARAH</p>
        </div>

        <button class="btn btn-warning w-100 mt-4 fw-bold shadow-sm btn-sm" onclick="finalizarTurno()">CIERRE DE CAJA</button>
    </aside>

    <main>
        <div class="alert alert-success border-0 shadow-sm mb-4 py-3 text-center">
            <p class="fw-bold m-0 fs-5">"Les agradecemos por ser parte de nuestro equipo. Que Dios los bendiga y que el turno sea un éxito."</p>
        </div>

        <!-- VENTAS (Conexión a tabla 'salidas') -->
        <div id="p-ventas" class="pos-panel active">
            <div class="card-g">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0 text-danger"><i class="bi bi-upc-scan me-2"></i> Nueva Remisión de Salida</h5>
                    <input type="text" id="ean-scanner" class="form-control w-50 border-danger" placeholder="🔍 Escanee código..." onkeypress="handleScan(event)">
                </div>
                <table class="table"><tbody id="v-list"></tbody></table>
                <div class="text-end mt-4 pt-4 border-top">
                    <h3 class="fw-bold text-success">TOTAL: $<span id="t-val">0</span></h3>
                    <button class="btn btn-success px-5 py-3 fw-bold shadow" onclick="registrarVenta()">REGISTRAR SALIDA</button>
                </div>
            </div>
        </div>

        <!-- INVENTARIO (Conexión a tabla 'productos') -->
        <div id="p-inv" class="pos-panel">
            <div class="card-g">
                <h5 class="fw-bold mb-4">Stock Real en Bodega</h5>
                <table class="table table-hover table-sm">
                    <thead class="table-dark"><tr><th>Nombre</th><th>Stock</th><th>Precio</th></tr></thead>
                    <tbody id="i-list"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const VAULT = {
        U: "https://tzseklsayxaldtqatwuq.supabase.co",
        K: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    let segundos = 18000, carrito = [], totalTurno = 0;

    window.onload = () => {
        setInterval(() => {
            if (segundos > 0) {
                segundos--;
                let h = Math.floor(segundos / 3600), m = Math.floor((segundos % 3600) / 60), s = segundos % 60;
                document.getElementById('reloj-global').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }, 1000);
    };

    // ESCÁNER (Busca en tabla 'productos')
    async function handleScan(e) {
        if (e.key === 'Enter') {
            const ean = e.target.value.trim();
            const res = await fetch(`${VAULT.U}/rest/v1/productos?ean=eq.${ean}&select=*`, { headers: { 'apikey': VAULT.K } });
            const data = await res.json();
            if (data.length > 0) { carrito.push(data[0]); renderVenta(); }
            e.target.value = "";
        }
    }

    function renderVenta() {
        let t = 0;
        document.getElementById('v-list').innerHTML = carrito.map((p, i) => {
            t += p.precio1;
            return `<tr><td>${p.nombre}</td><td>$${p.precio1.toLocaleString()}</td><td><button class="btn btn-sm text-danger border-0" onclick="carrito.splice(${i},1);renderVenta()"><i class="bi bi-trash"></i></button></td></tr>`;
        }).join('');
        document.getElementById('t-val').innerText = t.toLocaleString();
    }

    // REGISTRO (Guarda en tabla 'salidas' y descuenta stock)
    async function registrarVenta() {
        if(carrito.length === 0) return;
        const totalVenta = parseInt(document.getElementById('t-val').innerText.replace(/\D/g,''));
        
        for (let item of carrito) {
            // 1. Registrar salida
            await fetch(`${VAULT.U}/rest/v1/salidas`, {
                method: 'POST',
                headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json' },
                body: JSON.stringify({ producto: item.nombre, monto: item.precio1, fecha: new Date().toISOString() })
            });
            // 2. Descontar stock
            await fetch(`${VAULT.U}/rest/v1/productos?ean=eq.${item.ean}`, {
                method: 'PATCH',
                headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json' },
                body: JSON.stringify({ stock: item.stock - 1 })
            });
        }
        totalTurno += totalVenta;
        alert("✅ Remisión Guardada en Tabla 'Salidas'");
        carrito = []; renderVenta();
    }

    async function cargarInv() {
        const res = await fetch(`${VAULT.U}/rest/v1/productos?select=*&order=nombre.asc`, { headers: { 'apikey': VAULT.K } });
        const data = await res.json();
        document.getElementById('i-list').innerHTML = data.map(p => `<tr><td>${p.nombre}</td><td>${p.stock}</td><td>$${p.precio1.toLocaleString()}</td></tr>`).join('');
    }

    function showP(id, el) {
        document.querySelectorAll('.pos-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(el.classList.contains('nav-link')) el.classList.add('active');
        if(id === 'p-inv') cargarInv();
    }

    async function finalizarTurno() {
        if(confirm(`¿Cerrar caja? Total: $${totalTurno.toLocaleString()}`)) {
            // Registra cierre en 'movimientos_caja'
            await fetch(`${VAULT.U}/rest/v1/movimientos_caja`, {
                method: 'POST',
                headers: { 'apikey': VAULT.K, 'Content-Type': 'application/json' },
                body: JSON.stringify({ monto: totalTurno, descripcion: 'CIERRE TURNO SARAH', fecha: new Date().toISOString() })
            });
            location.reload();
        }
    }
</script>
</body>
</html>
