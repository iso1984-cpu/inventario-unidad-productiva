<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUERRERO ERP v15 - Conexión Blindada</title>

    <!-- 1. CARGA CRÍTICA (Prioridad Máxima) -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">

    <style>
        :root { --g-red: #e31e24; --g-dark: #2c3e50; }
        body { background-color: #f1f3f5; font-family: 'Segoe UI', sans-serif; }
        .login-screen { position: fixed; inset: 0; background: #f1f3f5; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .is-loading { pointer-events: none; opacity: 0.7; }
        #app { display: none; }
        .status-badge { font-size: 0.8rem; font-weight: 600; border-radius: 8px; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen is-loading">
    <div class="card shadow-lg p-5 text-center" style="width: 450px; border-radius: 20px;">
        <h3 class="fw-bold text-danger mb-4">GUERRERO ERP</h3>
        
        <!-- Barra de Estado Dinámica -->
        <div id="status-bar" class="alert alert-warning py-2 status-badge mb-4">
            <span class="spinner-border spinner-border-sm me-2"></span> Sincronizando núcleo...
        </div>

        <select id="select_caja" class="form-select mb-3">
            <optgroup label="Caja 1"><option value="Caja 1 Mañana">☀️ Caja 1 - Mañana</option><option value="Caja 1 Tarde">🌙 Caja 1 - Tarde</option></optgroup>
            <optgroup label="Caja 2"><option value="Caja 2 Mañana">☀️ Caja 2 - Mañana</option><option value="Caja 2 Tarde">🌙 Caja 2 - Tarde</option></optgroup>
            <optgroup label="Caja 3"><option value="Caja 3 Mañana">☀️ Caja 3 - Mañana</option><option value="Caja 3 Tarde">🌙 Caja 3 - Tarde</option></optgroup>
            <optgroup label="Caja 4"><option value="Caja 4 Mañana">☀️ Caja 4 - Mañana</option><option value="Caja 4 Tarde">🌙 Caja 4 - Tarde</option></optgroup>
        </select>

        <input type="email" id="log_user" class="form-control mb-2" placeholder="sarita.6421@gmail.com">
        <input type="password" id="log_pass" class="form-control mb-4" placeholder="••••••••">
        <button id="btn-login" class="btn btn-danger w-100 py-3 fw-bold shadow" onclick="GuerreroApp.login()" disabled>CONECTANDO...</button>
    </div>
</div>

<!-- Estructura de la APP (se muestra tras login) -->
<div id="app">
    <div class="p-4">
        <h2 class="text-danger">Panel Guerrero ERP - Activo</h2>
        <p>Turno: <span id="display-caja"></span></p>
        <!-- Aquí va el resto de tu lógica de ventas/inventario -->
    </div>
</div>

<script>
/**
 * GUERRERO ENGINE - SOLUCIÓN PERMANENTE
 */
const GuerreroApp = (() => {
    const CONFIG = {
        SURL: "https://tzseklsayxaldtqatwuq.supabase.co",
        SKEY: "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5"
    };

    let client = null;

    // Inicialización con Protección de SDK
    const init = async () => {
        const status = document.getElementById('status-bar');
        const btn = document.getElementById('btn-login');
        const screen = document.getElementById('login-screen');

        try {
            // Espera activa (Poll Pattern): Reintenta cada 300ms hasta que la librería exista
            const waitForSDK = async () => {
                let limit = 20; // 6 segundos de espera máxima
                while (!window.supabase && limit > 0) {
                    await new Promise(r => setTimeout(r, 300));
                    limit--;
                }
                return !!window.supabase;
            };

            const sdkReady = await waitForSDK();

            if (!sdkReady) throw new Error("Tiempo de espera agotado: El SDK de Supabase no cargó.");

            // Inicialización del cliente
            client = window.supabase.createClient(CONFIG.SURL, CONFIG.SKEY);
            
            // UI Update: Éxito
            status.className = "alert alert-success py-2 status-badge mb-4";
            status.innerHTML = "✅ Sistema Listo para Ingreso";
            btn.disabled = false;
            btn.innerText = "INICIAR TURNO 5H";
            screen.classList.remove('is-loading');

        } catch (e) {
            status.className = "alert alert-danger py-2 status-badge mb-4";
            status.innerHTML = "❌ Error Crítico: SDK no detectado";
            console.error("[Kernel] Error Fatal:", e.message);
        }
    };

    const login = async () => {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;
        const btn = document.getElementById('btn-login');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Validando...';

        try {
            const { data, error } = await client.auth.signInWithPassword({ email, password: pass });

            if (error) throw error;

            // Éxito en Login
            document.getElementById('display-caja').innerText = document.getElementById('select_caja').value;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';

        } catch (e) {
            alert("Error de acceso: " + e.message);
            btn.disabled = false;
            btn.innerText = "INICIAR TURNO 5H";
        }
    };

    // Lanzar motor al cargar el DOM
    document.addEventListener('DOMContentLoaded', init);

    return { login };
})();
</script>
</body>
</html>
