<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Guerrero - Punto de Venta Final</title>

    <!-- 1. LIBRERÍA SUPABASE (Versión 2 con carga prioritaria) -->
    <script src="https://cdn.jsdelivr.net"></script>

    <!-- 2. AUDITORÍA Y SCRIPT LÓGICO DE CONEXIÓN (ENCABEZADO) -->
    <script>
        // Credenciales extraídas de tu proyecto (tzseklsayxaldtqatwuq)
        const SURL = "https://tzseklsayxaldtqatwuq.supabase.co"; 
        const SKEY = "sb_publishable_qDqumbtdB4vA3btU7USJsQ_kay6Rrh5";

        let supabase;

        // Función de inicialización blindada
        async function conectarSupabase() {
            try {
                // Verificamos si la librería cargó en el objeto global 'window'
                if (window.supabase) {
                    supabase = window.supabase.createClient(SURL, SKEY);
                    console.log("✅ Conexión establecida con Supabase.");
                    
                    // Actualizar el estado visual si los elementos ya existen
                    const status = document.getElementById('login-status');
                    if (status) {
                        status.innerText = "● Conexión Establecida";
                        status.className = "small mb-3 text-success";
                    }
                } else {
                    throw new Error("La librería CDN aún no ha cargado.");
                }
            } catch (e) {
                console.warn("Retrying connection...", e.message);
                setTimeout(conectarSupabase, 1500); // Reintento cada 1.5 seg
            }
        }

        // Ejecutar conexión de inmediato
        conectarSupabase();
    </script>

    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --guerrero-red: #e31e24; --guerrero-green: #00a650; }
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .login-screen { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .sidebar { background: white; border-right: 1px solid #ddd; min-height: 100vh; padding: 20px; position: fixed; width: 220px; }
        main { margin-left: 240px; padding: 20px; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="card p-4 text-center shadow-lg" style="width: 350px; border: none; border-radius: 15px;">
        <h4 class="mb-2 fw-bold text-danger">TIENDA GUERRERO</h4>
        <!-- Monitor de estado en tiempo real -->
        <div id="login-status" class="small mb-3 text-danger">○ Conectando...</div>
        
        <input type="email" id="log_user" class="form-control mb-2" placeholder="sarita.6421@gmail.com">
        <input type="password" id="log_pass" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-danger w-100 fw-bold" onclick="login()">INGRESAR AL POS</button>
    </div>
</div>

<div id="app" style="display:none;">
    <nav class="sidebar shadow-sm">
        <h3 class="fw-bold text-danger mb-4">GUERRERO</h3>
        <p id="cajero-name" class="small text-muted fw-bold">Bienvenido</p>
        <button class="btn btn-outline-danger btn-sm w-100 mt-4" onclick="location.reload()">Cerrar Sesión</button>
    </nav>
    <main>
        <div class="card p-4">
            <h1 class="text-success fw-bold">SISTEMA CONECTADO ✅</h1>
            <p>Operando con <strong>Precio 1</strong>.</p>
        </div>
    </main>
</div>

<script>
    async function login() {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;

        if (!supabase) {
            alert("⚠️ El servidor aún no responde. Por favor, espere un segundo.");
            return;
        }

        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

        if (error) {
            alert("❌ Acceso Denegado: " + error.message);
        } else {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('cajero-name').innerText = `Cajero: ${email.split('@')[0].toUpperCase()}`;
        }
    }
</script>
</body>
</html>
