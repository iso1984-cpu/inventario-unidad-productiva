<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Guerrero - Punto de Venta Final</title>

    <!-- 1. CARGA DE LIBRERÍA SUPABASE -->
    <script src="https://cdn.jsdelivr.net"></script>

    <!-- 2. INICIALIZACIÓN INMEDIATA (ESTO ES LO QUE SOLICITASTE AL INICIO) -->
    <script>
        // Datos extraídos de tus capturas de pantalla
        const SURL = "https://tzseklsayxaldtqatwuq.supabase.co"; 
        const SKEY = "sb_publicable_qDqumbtdB4vA3btU7USjSQ_kay6RrS2T";

        // Creamos el cliente de forma global antes de que cargue el HTML
        const supabase = window.supabase.createClient(SURL, SKEY);
        
        console.log("Sistema Guerrero: Supabase inicializado correctamente.");
    </script>

    <!-- 3. ESTILOS Y BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root { --guerrero-red: #e31e24; --guerrero-green: #00a650; }
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: white; border-right: 1px solid #ddd; min-height: 100vh; padding: 20px; position: fixed; width: 220px; z-index: 100; }
        .login-screen { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        main { margin-left: 240px; padding: 20px; }
        .bill-tab { cursor: pointer; padding: 10px 20px; border: 1px solid #ddd; border-radius: 8px; margin-right: 5px; background: white; font-weight: bold; }
        .bill-tab.active { background: var(--guerrero-green); color: white; }
    </style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="login-screen" class="login-screen">
    <div class="card p-4 text-center shadow-lg" style="width: 350px;">
        <h4 class="mb-4 fw-bold text-danger">TIENDA GUERRERO</h4>
        <h6 class="mb-3 text-muted">🔐 Acceso Privado</h6>
        <input type="email" id="log_user" class="form-control mb-2" placeholder="Usuario (Email)">
        <input type="password" id="log_pass" class="form-control mb-3" placeholder="Contraseña">
        <!-- El botón ahora llama a la función que ya tiene el cliente listo -->
        <button class="btn btn-danger w-100 fw-bold py-2" onclick="login()">INGRESAR AL SISTEMA</button>
    </div>
</div>

<div id="app" style="display:none;">
    <nav class="sidebar shadow-sm">
        <h3 class="fw-bold text-danger mb-4">GUERRERO</h3>
        <div class="nav flex-column nav-pills mt-2">
            <button class="nav-link active mb-2" data-bs-toggle="pill" data-bs-target="#t-venta">🛒 Venta (Precio 1)</button>
        </div>
        <hr>
        <p id="cajero-name" class="small text-muted fw-bold">Bienvenido: ---</p>
        <button class="btn btn-outline-danger btn-sm w-100 mt-4" onclick="location.reload()">Cerrar Sesión</button>
    </nav>

    <main>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="t-venta">
                <div class="d-flex mb-3">
                    <div class="bill-tab active" id="btn-tab-1" onclick="switchBill(1)">Cuenta 1</div>
                    <div class="bill-tab" id="btn-tab-2" onclick="switchBill(2)">Cuenta 2</div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="card p-3 mb-3">
                            <label class="fw-bold mb-2">Escáner / Código EAN</label>
                            <input type="text" id="scan_pos" class="form-control form-control-lg border-2" placeholder="Listo para escanear..." onkeypress="handleScan(event)" autofocus>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card p-4 shadow-sm">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>Descripción</th>
                                        <th>Cant.</th>
                                        <th>Precio 1</th>
                                        <th>Subtotal</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="cart-list"></tbody>
                            </table>
                            <div class="text-end mt-4">
                                <h1 class="text-success fw-bold">TOTAL: $<span id="total_v">0</span></h1>
                                <button class="btn btn-success btn-lg w-100 py-3 mt-3 fw-bold" onclick="finalizarVenta()">✅ REGISTRAR VENTA</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // Variables de estado del carrito
    let bills = { 1: [], 2: [] }, activeBill = 1;
    let currentUser = "";

    // LÓGICA DE LOGIN (Usa el objeto 'supabase' creado arriba en el head)
    async function login() {
        const email = document.getElementById('log_user').value;
        const pass = document.getElementById('log_pass').value;
        
        const { data, error } = await supabase.auth.signInWithPassword({ 
            email: email, 
            password: pass 
        });

        if (error) {
            alert("Error de acceso: " + error.message);
        } else {
            currentUser = email;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('cajero-name').innerText = `Cajero: ${email.split('@')[0].toUpperCase()}`;
            document.getElementById('scan_pos').focus();
        }
    }

    function handleScan(e) { if (e.key === 'Enter') addItem(); }

    async function addItem() {
        const input = document.getElementById('scan_pos');
        const code = input.value.trim();
        if (!code) return;

        const { data, error } = await supabase
            .from('productos')
            .select('codigo, producto, precio_1')
            .eq('codigo', code)
            .single();

        if (data) {
            const p1Val = data.precio_1 ? parseFloat(data.precio_1.toString().replace(',', '.')) : 0;
            bills[activeBill].push({
                codigo: data.codigo,
                nombre: data.producto,
                precio: p1Val,
                cantidad: 1
            });
            renderCart();
            input.value = "";
        } else {
            alert("⚠️ Producto no encontrado.");
            input.value = "";
        }
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        list.innerHTML = "";
        let total = 0;
        bills[activeBill].forEach((item, i) => {
            const sub = item.precio * item.cantidad;
            total += sub;
            list.innerHTML += `
                <tr>
                    <td><strong>${item.nombre}</strong></td>
                    <td>${item.cantidad}</td>
                    <td>$${item.precio.toLocaleString()}</td>
                    <td class="fw-bold">$${sub.toLocaleString()}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="removeItem(${i})">✕</button></td>
                </tr>`;
        });
        document.getElementById('total_v').innerText = total.toLocaleString();
    }

    function removeItem(i) { bills[activeBill].splice(i, 1); renderCart(); }
    
    function switchBill(n) {
        activeBill = n;
        document.querySelectorAll('.bill-tab').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-tab-${n}`).classList.add('active');
        renderCart();
    }

    async function finalizarVenta() {
        const total = document.getElementById('total_v').innerText;
        if (total === "0") return;
        
        alert("Venta con Precio 1 registrada: $" + total);
        bills[activeBill] = [];
        renderCart();
    }
</script>

<script src="https://cdn.jsdelivr.net"></script>
</body>
</html>
